server:
  port: ${PORT:8080}

spring:
  application:
    name: Mahjong Online

  # ── Database (H2 for dev, PostgreSQL for prod) ──
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:mahjongdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USER:sa}
    password: ${DB_PASS:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}

  h2:
    console:
      enabled: true
      path: /h2-console

  # ── OAuth2 ──
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-secret}
            scope: email, profile
          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:your-facebook-client-id}
            client-secret: ${FACEBOOK_CLIENT_SECRET:your-facebook-secret}
            scope: email, public_profile

  jackson:
    serialization:
      indent-output: false

# ── JWT ──
jwt:
  secret: ${JWT_SECRET:mahjong-super-secret-key-2025-change-in-production-min-256bits}
  expiration: 86400000   # 24 hours
  refresh-expiration: 604800000  # 7 days

# ── App ──
app:
  frontend-url: ${FRONTEND_URL:http://localhost:8080}
  allow-origins: ${ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5173}
