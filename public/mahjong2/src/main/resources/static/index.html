<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🀄 中國麻將 Online</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<style>
:root {
  --green: #1B4D2E; --green-dark: #0d2015; --green-light: #236037;
  --ivory: #FFFBE6; --ivory-dark: #F0E8C8; --gold: #D4AF37;
  --red: #CC2200; --blue: #1A4A8A; --text: #2a1a08;
  --bg: #0d1a12; --card: rgba(0,0,0,0.45); --border: rgba(255,255,255,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'PingFang TC','Microsoft JhengHei',sans-serif;
       color: var(--ivory); min-height: 100vh; }

/* ── Pages ── */
.page { display: none; min-height: 100vh; }
.page.active { display: flex; flex-direction: column; }

/* ── Auth Page ── */
#page-auth {
  align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, #1a4a28 0%, var(--bg) 100%);
}
.auth-box { background: var(--card); border: 1px solid rgba(212,175,55,0.3);
  border-radius: 16px; padding: 36px 40px; width: 380px;
  backdrop-filter: blur(8px); box-shadow: 0 0 40px rgba(0,0,0,0.5); }
.auth-logo { text-align:center; font-size: 2.5rem; margin-bottom: 4px; }
.auth-title { text-align:center; color: var(--gold); font-size: 1.3rem; margin-bottom: 24px; }
.auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border-radius: 8px; overflow: hidden;
  border: 1px solid var(--border); }
.auth-tab { flex:1; padding: 8px; text-align: center; cursor: pointer; font-size: 0.85rem;
  background: transparent; color: var(--ivory-dark); border: none; transition: all 0.2s; }
.auth-tab.active { background: rgba(212,175,55,0.2); color: var(--gold); }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: var(--ivory-dark); }
.form-group input { width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.08);
  border: 1px solid var(--border); border-radius: 8px; color: var(--ivory); font-size: 0.95rem; }
.form-group input:focus { outline: none; border-color: rgba(212,175,55,0.5); }
.btn-primary { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--gold), #8a6a00);
  color: #1a0800; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold;
  cursor: pointer; margin-top: 4px; transition: opacity 0.2s; }
.btn-primary:hover { opacity: 0.9; }
.divider { text-align:center; margin: 16px 0; color: rgba(255,255,255,0.3); font-size: 0.8rem;
  position: relative; }
.divider::before,.divider::after { content:''; position:absolute; top:50%; width:42%; height:1px;
  background: var(--border); }
.divider::before { left:0; } .divider::after { right:0; }
.oauth-btns { display: flex; gap: 8px; }
.btn-oauth { flex:1; padding: 10px 8px; border: 1px solid var(--border); border-radius: 8px;
  background: rgba(255,255,255,0.06); color: var(--ivory); cursor: pointer; font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.2s; }
.btn-oauth:hover { background: rgba(255,255,255,0.12); }
.error-msg { color: #f88; font-size: 0.82rem; margin-top: 8px; text-align: center; }

/* ── Lobby Page ── */
#page-lobby { background: radial-gradient(ellipse at center, #1a3a28 0%, var(--bg) 100%); }
.navbar { display:flex; justify-content:space-between; align-items:center;
  padding: 12px 24px; background: rgba(0,0,0,0.4); border-bottom: 1px solid var(--border); }
.navbar-brand { color: var(--gold); font-size: 1.1rem; font-weight: bold; }
.navbar-user { display:flex; align-items:center; gap: 12px; }
.avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--green-light);
  display: flex; align-items: center; justify-content: center; font-size: 1rem;
  border: 2px solid rgba(212,175,55,0.4); overflow: hidden; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.btn-sm { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: rgba(255,255,255,0.08); color: var(--ivory); cursor: pointer; font-size: 0.82rem; }
.btn-sm:hover { background: rgba(255,255,255,0.15); }
.btn-danger { border-color: rgba(200,60,60,0.4); background: rgba(180,40,40,0.15); }

.lobby-content { display: grid; grid-template-columns: 1fr 320px; gap: 16px;
  padding: 20px; max-width: 1100px; margin: 0 auto; flex: 1; }

.rooms-panel h2, .create-panel h2 { color: var(--gold); font-size: 1rem; margin-bottom: 12px; }
.room-list { display: flex; flex-direction: column; gap: 8px; }
.room-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
  transition: border-color 0.2s; }
.room-card:hover { border-color: rgba(212,175,55,0.3); }
.room-info h3 { font-size: 0.95rem; margin-bottom: 4px; }
.room-info .meta { font-size: 0.78rem; color: rgba(255,255,255,0.5); }
.room-slots { font-size: 0.85rem; color: var(--gold); }
.btn-join { padding: 7px 16px; background: linear-gradient(135deg, var(--green-light), var(--green));
  border: none; border-radius: 6px; color: #fff; cursor: pointer; font-size: 0.85rem; }
.no-rooms { text-align:center; color: rgba(255,255,255,0.3); padding: 40px; font-size: 0.9rem; }

.create-panel { display: flex; flex-direction: column; gap: 16px; }
.panel-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 18px; }
.panel-card h2 { color: var(--gold); font-size: 1rem; margin-bottom: 14px; }
.form-row { margin-bottom: 12px; }
.form-row label { display: block; font-size: 0.78rem; color: var(--ivory-dark); margin-bottom: 4px; }
.form-row select, .form-row input {
  width: 100%; padding: 8px 10px; background: rgba(255,255,255,0.07);
  border: 1px solid var(--border); border-radius: 6px; color: var(--ivory); font-size: 0.88rem; }
.invite-row { display:flex; gap: 8px; }
.invite-row input { flex: 1; }
.invite-code-display { background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.3);
  border-radius: 8px; padding: 10px 14px; text-align:center; margin-top: 10px; }
.invite-code-display .code { font-size: 1.6rem; font-weight: bold; color: var(--gold);
  letter-spacing: 0.2em; }

/* ── Game Room Page ── */
#page-game { background: radial-gradient(ellipse at center, #1a3a28 0%, var(--bg) 100%); }
.game-layout { display: grid; grid-template-columns: 1fr 300px;
  grid-template-rows: auto 1fr; height: calc(100vh - 52px); gap: 0; }
.game-main { padding: 8px; overflow: hidden; }
.game-sidebar { display: flex; flex-direction: column;
  border-left: 1px solid var(--border); background: rgba(0,0,0,0.3); overflow: hidden; }

/* Table (same as v1) */
.table-layout { display: grid; grid-template-columns: 110px 1fr 110px;
  grid-template-rows: auto auto auto; gap: 6px; height: 100%; }
.player-area { background: rgba(0,0,0,0.25); border-radius: 10px; padding: 8px;
  border: 1px solid var(--border); }
.player-area.active { border-color: rgba(212,175,55,0.5); }
.player-area.winner { border-color: #ff4; box-shadow: 0 0 15px rgba(255,255,0,0.3); }
.north-area { grid-column: 1/-1; }
.west-area { grid-column:1; } .center-area { grid-column:2; } .east-area { grid-column:3; }
.south-area { grid-column: 1/-1; }
.player-label { font-size: 0.72rem; color: var(--ivory-dark); display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.wind-badge { padding: 1px 6px; border-radius: 4px; font-size: 0.68rem;
  background: rgba(212,175,55,0.2); color: var(--gold); }
.tiles-row { display:flex; flex-wrap:wrap; gap:3px; }
.tile { display:inline-flex; flex-direction:column; align-items:center; justify-content:center;
  width:38px; height:50px; border-radius:5px; font-size:1.1rem; cursor:pointer;
  background:linear-gradient(160deg,#fffff8,var(--ivory-dark));
  border:1px solid #c8b88a; box-shadow:1px 2px 4px rgba(0,0,0,0.3);
  color:var(--text); transition:transform 0.15s; user-select:none; position:relative; }
.tile:hover { transform:translateY(-4px); }
.tile.selected { transform:translateY(-8px); border-color:var(--gold);
  box-shadow:0 8px 16px rgba(212,175,55,0.5); }
.tile .suit-label { font-size:0.45rem; color:#888; position:absolute; bottom:2px; }
.tile.jian-1 { color:var(--red); } .tile.jian-2 { color:#007700; } .tile.jian-3 { color:#555; }
.tile-sm { width:26px; height:34px; border-radius:4px; font-size:0.8rem;
  display:inline-flex; align-items:center; justify-content:center;
  background:linear-gradient(160deg,#fffff8,var(--ivory-dark)); border:1px solid #c8b88a;
  color:var(--text); }
.tile-back { display:inline-flex; align-items:center; justify-content:center;
  width:26px; height:34px; border-radius:4px; background:linear-gradient(135deg,#3a5a8a,#1a3060);
  border:1px solid rgba(255,255,255,0.2); font-size:0.85rem; }
.discard-pool { display:flex; flex-wrap:wrap; gap:2px; margin-top:4px; }
.discard-tile { width:20px; height:26px; border-radius:2px; font-size:0.65rem;
  display:inline-flex; align-items:center; justify-content:center;
  background:rgba(255,255,252,0.85); color:var(--text); border:1px solid rgba(200,184,138,0.5); }
.discard-tile.last { border-color:var(--gold); }
.exposed-melds { display:flex; gap:5px; flex-wrap:wrap; margin-top:4px; }
.meld-group { display:flex; gap:1px; padding:2px; background:rgba(0,0,0,0.15); border-radius:4px; }
.center-area { display:flex; flex-direction:column; align-items:center; justify-content:space-between; }
.wall-count { font-size:1.4rem; font-weight:bold; color:var(--gold); }
.action-bar { display:flex; gap:6px; flex-wrap:wrap; padding:6px 10px;
  background:rgba(0,0,0,0.4); border-radius:8px; margin-top:6px; }
.btn-action { padding:7px 14px; border:none; border-radius:7px; font-size:0.88rem;
  font-weight:bold; cursor:pointer; transition:transform 0.1s; }
.btn-action:hover { transform:translateY(-2px); }
.btn-discard { background:linear-gradient(135deg,#cc6600,#994400); color:#fff; }
.btn-peng { background:linear-gradient(135deg,#cc4400,#882200); color:#fff; }
.btn-chi { background:linear-gradient(135deg,#2244cc,#112288); color:#fff; }
.btn-gang { background:linear-gradient(135deg,#666,#333); color:#fff; }
.btn-win { background:linear-gradient(135deg,var(--gold),#8a6a00); color:#1a0800;
  box-shadow:0 0 12px rgba(212,175,55,0.4); }
.btn-pass { background:rgba(255,255,255,0.1); color:var(--ivory-dark); }
.msg-box { padding:6px 12px; background:rgba(0,0,0,0.3); border-radius:7px;
  font-size:0.85rem; min-height:32px; margin-top:6px; text-align:center; }

/* ── Sidebar: Chat + Video ── */
.sidebar-tabs { display:flex; border-bottom:1px solid var(--border); }
.sidebar-tab { flex:1; padding:10px; text-align:center; cursor:pointer; font-size:0.82rem;
  color: var(--ivory-dark); border:none; background:transparent; transition:all 0.2s; }
.sidebar-tab.active { color:var(--gold); border-bottom:2px solid var(--gold); }

/* Video grid */
.video-grid { padding:8px; display:grid; grid-template-columns:1fr 1fr;
  gap:6px; overflow-y:auto; flex:1; }
.video-slot { border-radius:8px; overflow:hidden; background:#111; position:relative;
  aspect-ratio:4/3; }
.video-slot video { width:100%; height:100%; object-fit:cover; }
.video-label { position:absolute; bottom:4px; left:6px; font-size:0.7rem;
  background:rgba(0,0,0,0.6); padding:2px 6px; border-radius:4px; }
.video-controls { padding:8px; display:flex; gap:6px; justify-content:center;
  border-top:1px solid var(--border); }
.btn-media { padding:8px 14px; border-radius:20px; border:1px solid var(--border);
  background:rgba(255,255,255,0.08); color:var(--ivory); cursor:pointer; font-size:0.8rem; }
.btn-media.active { background:rgba(212,175,55,0.2); border-color:rgba(212,175,55,0.5); color:var(--gold); }
.btn-media.danger { background:rgba(180,40,40,0.2); border-color:rgba(200,60,60,0.4); color:#f88; }

/* Chat */
.chat-panel { display:flex; flex-direction:column; flex:1; overflow:hidden; }
.chat-messages { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:6px; }
.chat-msg { max-width:90%; }
.chat-msg.self { align-self:flex-end; }
.chat-msg .bubble { padding:7px 11px; border-radius:12px; font-size:0.85rem; line-height:1.4; }
.chat-msg.other .bubble { background:rgba(255,255,255,0.1); }
.chat-msg.self .bubble { background:rgba(212,175,55,0.2); color:var(--gold); }
.chat-msg.system .bubble { background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.4);
  font-size:0.78rem; text-align:center; margin:0 auto; }
.chat-msg .sender { font-size:0.7rem; color:rgba(255,255,255,0.4); margin-bottom:2px; }
.chat-input { display:flex; gap:6px; padding:8px; border-top:1px solid var(--border); }
.chat-input input { flex:1; padding:8px 12px; background:rgba(255,255,255,0.07);
  border:1px solid var(--border); border-radius:20px; color:var(--ivory); font-size:0.88rem; }
.chat-input input:focus { outline:none; border-color:rgba(212,175,55,0.4); }
.btn-send { padding:8px 14px; background:rgba(212,175,55,0.2); border:1px solid rgba(212,175,55,0.4);
  border-radius:20px; color:var(--gold); cursor:pointer; font-size:0.85rem; }

/* ── Settlement overlay ── */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200;
  align-items:center; justify-content:center; }
.overlay.show { display:flex; }
.settle-card { background:linear-gradient(160deg,#1a3a20,#0d2015); border:2px solid var(--gold);
  border-radius:16px; padding:32px 40px; min-width:340px; max-width:480px;
  box-shadow:0 0 40px rgba(212,175,55,0.3); }
.settle-card h2 { color:var(--gold); text-align:center; margin-bottom:18px; }
.fan-item { display:flex; justify-content:space-between; padding:4px 0;
  border-bottom:1px solid rgba(255,255,255,0.08); font-size:0.88rem; }
.fan-total { display:flex; justify-content:space-between; padding:8px 0;
  font-weight:bold; border-top:1px solid var(--gold); color:var(--gold); }
.score-row { display:flex; justify-content:space-between; padding:4px 0; font-size:0.88rem; }
.pos { color:#6f6; } .neg { color:#f66; }
.settle-btns { display:flex; gap:10px; margin-top:20px; }
.settle-btn { flex:1; padding:11px; border:none; border-radius:8px; font-size:0.95rem;
  cursor:pointer; font-weight:bold; }
.settle-continue { background:linear-gradient(135deg,var(--gold),#8a6a00); color:#1a0800; }
.settle-exit { background:rgba(255,255,255,0.1); color:var(--ivory); }

@media(max-width:700px) {
  .game-layout { grid-template-columns: 1fr; }
  .game-sidebar { display:none; }
  .lobby-content { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<!-- ═══ Auth Page ═══ -->
<div id="page-auth" class="page active">
  <div class="auth-box">
    <div class="auth-logo">🀄</div>
    <div class="auth-title">中國麻將 Online</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">登入</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">註冊</button>
      <button class="auth-tab" onclick="switchAuthTab('phone')">手機</button>
    </div>

    <!-- Login -->
    <div id="auth-login">
      <div class="form-group">
        <label>Email</label>
        <input id="login-email" type="email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input id="login-pass" type="password" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="doLogin()">登入</button>
      <div class="divider">或</div>
      <div class="oauth-btns">
        <button class="btn-oauth" onclick="oauthLogin('google')">🌐 Google</button>
        <button class="btn-oauth" onclick="oauthLogin('facebook')">📘 Facebook</button>
      </div>
    </div>

    <!-- Register -->
    <div id="auth-register" style="display:none">
      <div class="form-group">
        <label>暱稱</label>
        <input id="reg-name" type="text" placeholder="玩家暱稱">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input id="reg-email" type="email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input id="reg-pass" type="password" placeholder="至少 6 位">
      </div>
      <button class="btn-primary" onclick="doRegister()">建立帳號</button>
    </div>

    <!-- Phone OTP -->
    <div id="auth-phone" style="display:none">
      <div id="phone-step1">
        <div class="form-group">
          <label>手機號碼</label>
          <input id="phone-num" type="tel" placeholder="+886912345678">
        </div>
        <button class="btn-primary" onclick="sendOtp()">發送驗證碼</button>
      </div>
      <div id="phone-step2" style="display:none">
        <div class="form-group">
          <label>驗證碼（6 位）</label>
          <input id="phone-otp" type="text" placeholder="123456" maxlength="6">
        </div>
        <button class="btn-primary" onclick="verifyOtp()">驗證登入</button>
      </div>
    </div>

    <div id="auth-error" class="error-msg"></div>
  </div>
</div>

<!-- ═══ Lobby Page ═══ -->
<div id="page-lobby" class="page">
  <nav class="navbar">
    <div class="navbar-brand">🀄 麻將大廳</div>
    <div class="navbar-user">
      <div class="avatar" id="nav-avatar">?</div>
      <span id="nav-username">玩家</span>
      <span id="nav-score" style="color:var(--gold);font-size:0.85rem;"></span>
      <button class="btn-sm" onclick="startSinglePlayer()">單人練習</button>
      <button class="btn-sm btn-danger" onclick="logout()">登出</button>
    </div>
  </nav>

  <div class="lobby-content">
    <!-- Room list -->
    <div class="rooms-panel">
      <h2>🎮 開放房間 <button class="btn-sm" style="margin-left:8px" onclick="loadRooms()">🔄</button></h2>
      <div class="room-list" id="room-list">
        <div class="no-rooms">載入中...</div>
      </div>
    </div>

    <!-- Create + join -->
    <div class="create-panel">
      <div class="panel-card">
        <h2>➕ 建立房間</h2>
        <div class="form-row">
          <label>房間名稱</label>
          <input id="room-name" type="text" placeholder="我的麻將房">
        </div>
        <div class="form-row">
          <label>AI 難度</label>
          <select id="room-ai">
            <option value="1">⭐ 新手</option>
            <option value="2" selected>⭐⭐ 普通</option>
            <option value="3">⭐⭐⭐ 進階</option>
            <option value="4">⭐⭐⭐⭐ 高手</option>
          </select>
        </div>
        <div class="form-row">
          <label><input type="checkbox" id="room-private" style="margin-right:6px">私人房間</label>
        </div>
        <button class="btn-primary" onclick="createRoom()">建立房間</button>
      </div>

      <div class="panel-card">
        <h2>🔗 邀請碼加入</h2>
        <div class="invite-row">
          <input id="invite-input" type="text" placeholder="輸入邀請碼" maxlength="6"
            style="text-transform:uppercase;">
          <button class="btn-join" onclick="joinByCode()">加入</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ Game Room ═══ -->
<div id="page-game" class="page">
  <nav class="navbar">
    <div class="navbar-brand">🀄 <span id="game-room-name">麻將</span></div>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="game-round-info" style="font-size:0.82rem;color:var(--gold);"></span>
      <button class="btn-sm" onclick="leaveGame()">← 離開</button>
    </div>
  </nav>

  <div class="game-layout">
    <!-- Main board -->
    <div class="game-main">
      <!-- Scores bar -->
      <div id="score-bar" style="display:flex;gap:12px;margin-bottom:6px;font-size:0.8rem;"></div>

      <div class="table-layout">
        <!-- North -->
        <div class="player-area north-area" id="area-north">
          <div class="player-label">
            <span id="lbl-north">北家</span>
            <span class="wind-badge" id="wind-north">北</span>
            <span id="dealer-north" style="display:none;color:var(--gold)">★</span>
          </div>
          <div class="tiles-row" id="hand-north"></div>
          <div class="exposed-melds" id="exp-north"></div>
          <div class="discard-pool" id="disc-north"></div>
        </div>

        <!-- West -->
        <div class="player-area west-area" id="area-west">
          <div class="player-label">
            <span id="lbl-west">西家</span>
            <span class="wind-badge" id="wind-west">西</span>
            <span id="dealer-west" style="display:none;color:var(--gold)">★</span>

            <div class="video-label" id="vid-lbl-0">你</div>
          </div>
          <div class="video-slot" id="video-1">
            <video id="vid-1" autoplay playsinline></video>
            <div class="video-label" id="vid-lbl-1">東家</div>
          </div>
          <div class="video-slot" id="video-2">
            <video id="vid-2" autoplay playsinline></video>
            <div class="video-label" id="vid-lbl-2">北家</div>

          <input id="chat-input" type="text" placeholder="輸入訊息..."
            onkeydown="if(event.key==='Enter')sendChat()">
          <button class="btn-send" onclick="sendChat()">送出</button>

</div>

<!-- Settlement overlay -->
<div class="overlay" id="overlay-settle">
  <div class="settle-card">
    <h2 id="settle-title">🎉 結算</h2>
    <div id="settle-fans"></div>

      <button class="settle-btn settle-continue" id="btn-next-round" onclick="nextRound()">下一局</button>
      <button class="settle-btn settle-exit" onclick="leaveGame()">離開</button>
    </div>
  </div>

<script>
// ══════════════════════════════════════════════
//  App state
// ══════════════════════════════════════════════
const API = '/api';
let token = null, currentUser = null;
let roomId = null, gameState = null, selectedTile = null;
let prevScores = [30000,30000,30000,30000];
let stompClient = null;
// WebRTC
let localStream = null;
let peers = {};  // peerId -> RTCPeerConnection
let camOn = false, micOn = false;
const ICE_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' },
                      { urls: 'stun:stun1.l.google.com:19302' }];

// ══════════════════════════════════════════════
//  Auth helpers
// ══════════════════════════════════════════════
function authHeader() { return token ? { 'Authorization': 'Bearer ' + token } : {}; }

async function apiFetch(url, opts={}) {
  const res = await fetch(url, {
    ...opts,
    headers: { 'Content-Type':'application/json', ...authHeader(), ...(opts.headers||{}) }
  });
  if (res.status === 401) { logout(); return null; }
  return res;
}

// Check for OAuth2 redirect token in URL hash
(function checkHash() {
  const hash = location.hash;
  if (hash.includes('token=')) {
    const params = new URLSearchParams(hash.slice(1));
    const t = params.get('token'), r = params.get('refresh');
    if (t) { saveTokens(t, r); location.hash = ''; loadMe(); }
  } else {
    const saved = localStorage.getItem('mj_token');
    if (saved) { token = saved; loadMe(); }
  }
})();

function saveTokens(t, r) {
  token = t;
  localStorage.setItem('mj_token', t);
  if (r) localStorage.setItem('mj_refresh', r);
}

async function loadMe() {
  const res = await apiFetch(API + '/user/me');
  if (!res || !res.ok) { showPage('auth'); return; }
  currentUser = await res.json();
  updateNavbar();
  showPage('lobby');
  connectWS();
  loadRooms();
}

function updateNavbar() {
  if (!currentUser) return;
  document.getElementById('nav-username').textContent = currentUser.username;
  document.getElementById('nav-score').textContent = currentUser.score?.toLocaleString() + ' 分';
  const av = document.getElementById('nav-avatar');
  if (currentUser.avatarUrl) av.innerHTML = `<img src="${currentUser.avatarUrl}">`;
  else av.textContent = currentUser.username?.[0] || '?';
}

// ══════════════════════════════════════════════
//  Auth UI
// ══════════════════════════════════════════════
function switchAuthTab(tab) {
  ['login','register','phone'].forEach(t => {
    document.getElementById('auth-' + t).style.display = t === tab ? '' : 'none';
  });
  document.querySelectorAll('.auth-tab').forEach((el,i) => {
    el.classList.toggle('active', ['login','register','phone'][i] === tab);
  });
  document.getElementById('auth-error').textContent = '';
}

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-pass').value;
  try {
    const res = await fetch(API + '/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
    if (!res.ok) { showAuthError(data.error||'登入失敗'); return; }
    saveTokens(data.token, data.refreshToken);
    currentUser = data.user;
    updateNavbar(); showPage('lobby'); connectWS(); loadRooms();
  } catch(e) { showAuthError('連線錯誤'); }
}

async function doRegister() {
  const username = document.getElementById('reg-name').value;
  const email    = document.getElementById('reg-email').value;
  const password = document.getElementById('reg-pass').value;
  if (!username||!email||!password) { showAuthError('請填寫所有欄位'); return; }
  const res = await fetch(API + '/auth/register', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({username, email, password})
  });
  const data = await res.json();
  if (!res.ok) { showAuthError(data.error||'註冊失敗'); return; }
  saveTokens(data.token, data.refreshToken);
  currentUser = data.user;
  updateNavbar(); showPage('lobby'); connectWS(); loadRooms();
}

async function sendOtp() {
  const phone = document.getElementById('phone-num').value;
  const res = await fetch(API + '/auth/phone/send', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({phone})
  });
  if (res.ok) {
    document.getElementById('phone-step1').style.display = 'none';
    document.getElementById('phone-step2').style.display = '';
  } else { showAuthError('發送失敗'); }
}

async function verifyOtp() {
  const phone = document.getElementById('phone-num').value;
  const otp   = document.getElementById('phone-otp').value;
  const res = await fetch(API + '/auth/phone/verify', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({phone, otp})
  });
  const data = await res.json();
  if (!res.ok) { showAuthError(data.error||'驗證失敗'); return; }
  saveTokens(data.token, data.refreshToken);
  currentUser = data.user;
  updateNavbar(); showPage('lobby'); connectWS(); loadRooms();
}

function oauthLogin(provider) {
  location.href = '/oauth2/authorization/' + provider;
}

function showAuthError(msg) { document.getElementById('auth-error').textContent = msg; }

function logout() {
  token = null; currentUser = null;
  localStorage.removeItem('mj_token');
  localStorage.removeItem('mj_refresh');
  if (stompClient) stompClient.disconnect();
  showPage('auth');
}

// ══════════════════════════════════════════════
//  WebSocket (STOMP)
// ══════════════════════════════════════════════
function connectWS() {
  if (stompClient?.connected) return;
  const sock = new SockJS('/ws');
  stompClient = Stomp.over(sock);
  stompClient.debug = () => {};
  stompClient.connect({'Authorization': 'Bearer ' + token}, () => {
    console.log('WS connected');
    // Subscribe to lobby updates
    stompClient.subscribe('/topic/lobby', msg => {
      const data = JSON.parse(msg.body);
      if (data.rooms) renderRooms(data.rooms);
    });
  });
}

function subscribeRoom(rId) {
  if (!stompClient?.connected) return;

  stompClient.subscribe('/topic/room/' + rId, msg => {
    const data = JSON.parse(msg.body);
    if (data.event === 'PLAYER_JOINED') addChatMsg('系統', data.username + ' 加入房間', 'system');
    if (data.event === 'PLAYER_LEFT')   addChatMsg('系統', '玩家離開房間', 'system');
  });

  stompClient.subscribe('/topic/room/' + rId + '/chat', msg => {
    const m = JSON.parse(msg.body);
    const isSelf = m.senderId === currentUser?.id;
    addChatMsg(m.senderName, m.content, isSelf ? 'self' : 'other');
  });

  stompClient.subscribe('/topic/room/' + rId + '/game-state', msg => {
    const data = JSON.parse(msg.body);
    // Refresh game state
    if (data.type === 'GAME_STATE_UPDATE') fetchAndRender();
  });

  stompClient.subscribe('/topic/room/' + rId + '/presence', msg => {
    const data = JSON.parse(msg.body);
    if (data.event === 'JOIN' && data.userId !== currentUser?.id) {
      // New peer joined — initiate WebRTC
      initPeer(data.userId, true);
    }
    if (data.event === 'LEAVE') closePeer(data.userId);
  });

  // WebRTC signaling
  stompClient.subscribe('/user/queue/signal', msg => {
    const signal = JSON.parse(msg.body);
    handleSignal(signal);
  });
}

// ══════════════════════════════════════════════
//  Lobby
// ══════════════════════════════════════════════
async function loadRooms() {
  const res = await apiFetch(API + '/rooms');
  if (!res) return;
  const rooms = await res.json();
  renderRooms(rooms);
}

function renderRooms(rooms) {
  const list = document.getElementById('room-list');
  if (!rooms.length) { list.innerHTML = '<div class="no-rooms">目前沒有開放房間</div>'; return; }
  list.innerHTML = rooms.map(r => `
    <div class="room-card">
      <div class="room-info">
        <h3>${r.name}</h3>
        <div class="meta">AI ⭐×${r.aiLevel} · ${r.mode} · ${r.humanCount} 人</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="room-slots">${r.humanCount}/${r.maxPlayers}</div>
        ${!r.isFull ? `<button class="btn-join" onclick="joinRoom('${r.id}')">加入</button>` : '<span style="font-size:0.8rem;opacity:0.4">已滿</span>'}
      </div>
    </div>`).join('');
}

async function createRoom() {
  const name        = document.getElementById('room-name').value || currentUser?.username + ' 的房間';
  const aiLevel     = +document.getElementById('room-ai').value;
  const privateRoom = document.getElementById('room-private').checked;
  const res = await apiFetch(API + '/rooms', {
    method:'POST', body: JSON.stringify({name, aiLevel, privateRoom, mode:'QUICK'})
  });
  if (!res?.ok) return;
  const room = await res.json();
  enterRoom(room);
}

async function joinRoom(id) {
  const res = await apiFetch(API + '/rooms/' + id + '/join', { method:'POST' });
  if (!res?.ok) return;
  const room = await res.json();
  enterRoom(room);
}

async function joinByCode() {
  const code = document.getElementById('invite-input').value.trim().toUpperCase();
  if (!code) return;
  const res = await apiFetch(API + '/rooms/invite/' + code, { method:'POST' });
  if (!res?.ok) { alert('邀請碼無效'); return; }
  const room = await res.json();
  enterRoom(room);
}

function enterRoom(room) {
  roomId = room.id;
  document.getElementById('game-room-name').textContent = room.name;
  showPage('game');
  subscribeRoom(roomId);

  // Announce presence
  if (stompClient?.connected) {
    stompClient.send('/app/room/' + roomId + '/join', {}, JSON.stringify({
      username: currentUser?.username,
      avatarUrl: currentUser?.avatarUrl || ''
    }));
  }

  // If host, show start option; otherwise wait
  if (room.hostId === currentUser?.id) {
    startRoomGame(room);
  } else {
    document.getElementById('msg-box').textContent = '等待房主開始遊戲...';
  }
}

async function startRoomGame(room) {
  const res = await apiFetch(API + '/game/room/' + roomId + '/start', {
    method:'POST', body: JSON.stringify({totalRounds: 4})
  });
  if (!res?.ok) return;
  gameState = await res.json();
  renderGame();
}

async function startSinglePlayer() {
  const res = await apiFetch(API + '/game/start', {
    method:'POST', body: JSON.stringify({aiLevel:2, totalRounds:4})
  });
  if (!res?.ok) return;
  gameState = await res.json();
  roomId = gameState.gameId;
  document.getElementById('game-room-name').textContent = '單人練習';
  showPage('game');
  renderGame();
}

// ══════════════════════════════════════════════
//  Game rendering
// ══════════════════════════════════════════════
async function fetchAndRender() {
  const res = await apiFetch(API + '/game/' + roomId);
  if (!res?.ok) return;
  gameState = await res.json();
  renderGame();
}

function renderGame() {
  if (!gameState) return;
  const gs = gameState, players = gs.players;

  const windMap = {EAST:'東',SOUTH:'南',WEST:'西',NORTH:'北'};
  document.getElementById('game-round-info').textContent =
    `第${gs.round}/${gs.totalRounds}局 · ${windMap[gs.roundWind]||''}風圈`;
  document.getElementById('wall-count').textContent = gs.remainingTiles ?? '?';

  // Player positions: 0=south(you), 1=east, 2=north, 3=west
  const posMap = [{pos:'south',p:players[0]},{pos:'east',p:players[1]},
                   {pos:'north',p:players[2]},{pos:'west',p:players[3]}];

  for (const {pos, p} of posMap) {
    const isMe     = pos === 'south';
    const idx      = players.indexOf(p);
    const isActive = gs.currentPlayerIndex === idx;
    const isWinner = gs.winnerIndex === idx;

    document.getElementById('area-' + pos).className =
      `player-area ${pos}-area${isActive?' active':''}${isWinner?' winner':''}`;
    document.getElementById('lbl-' + pos).textContent = p.name;
    document.getElementById('wind-' + pos).textContent = windMap[p.wind] || '?';
    const dl = document.getElementById('dealer-' + pos);
    if (dl) dl.style.display = p.dealer ? '' : 'none';

    // Hand
    const handEl = document.getElementById('hand-' + pos);
    if (isMe) {
      handEl.innerHTML = p.hand.map(t => renderTile(t, false, true)).join('');
    } else {
      const settled = gs.phase === 'SETTLEMENT' || gs.phase === 'GAME_OVER';
      handEl.innerHTML = p.hand.map(t =>
        settled ? renderTile(t, true) : `<div class="tile-back">🀫</div>`).join('');
    }

    // Exposed
    document.getElementById('exp-' + pos).innerHTML = (p.exposed||[]).map(m =>
      `<div class="meld-group">${m.tiles.map(t=>renderTile(t,true)).join('')}</div>`
    ).join('');

    // Discards
    document.getElementById('disc-' + pos).innerHTML = (p.discards||[]).map((t,i) => {
      const isLast = i===p.discards.length-1 && gs.lastDiscardPlayerIndex===idx;
      return `<div class="discard-tile${isLast?' last':''}" title="${t.displayName}">${t.symbol||t.displayName}</div>`;
    }).join('');
  }

  // Last discard
  const ld = document.getElementById('last-discard');
  ld.innerHTML = gs.lastDiscard ? renderTile(gs.lastDiscard, false) : '';

  // Scores
  document.getElementById('score-bar').innerHTML = players.map(p =>
    `<span style="color:${p.type==='HUMAN'?'var(--gold)':'rgba(255,255,255,0.6)'}">${p.name}: ${p.score?.toLocaleString()}</span>`
  ).join(' · ');

  renderActions();
  document.getElementById('msg-box').textContent = gs.message || '';

  if (gs.phase === 'SETTLEMENT') showSettlement();
}

function renderTile(t, small=false, selectable=false) {
  if (!t) return '';
  if (t.hidden) return small ? `<div class="tile-back">🀫</div>`
    : `<div class="tile-back" style="width:38px;height:50px;font-size:1.1rem">🀫</div>`;
  const sym  = t.symbol || t.displayName || '?';
  const name = t.displayName || '?';
  const suit = (t.suit||'').toLowerCase();
  let cls = small ? 'tile-sm' : `tile ${suit}`;
  if (suit==='jian') cls += ` jian-${t.value}`;
  const sel = selectable && selectedTile?.id===t.id ? ' selected' : '';
  const click = selectable ? `onclick="selectTile('${t.id}')"` : '';
  if (small) return `<div class="${cls}" title="${name}">${sym}</div>`;
  return `<div class="${cls}${sel}" ${click} title="${name}" data-id="${t.id}">
    <span>${sym}</span><span class="suit-label">${name}</span></div>`;
}

function renderActions() {
  const gs = gameState, bar = document.getElementById('action-bar');
  const actions = gs.availableActions || [];
  bar.innerHTML = '';
  if (!actions.length) return;
  if (actions.includes('DISCARD'))       bar.innerHTML += `<button class="btn-action btn-discard" onclick="doDiscard()">打牌</button>`;
  if (actions.includes('CHI'))           bar.innerHTML += `<button class="btn-action btn-chi" onclick="doChi()">吃</button>`;
  if (actions.includes('PENG'))          bar.innerHTML += `<button class="btn-action btn-peng" onclick="act('PENG')">碰</button>`;
  if (actions.includes('GANG'))          bar.innerHTML += `<button class="btn-action btn-gang" onclick="act('GANG')">明槓</button>`;
  if (actions.includes('AN_GANG'))       bar.innerHTML += `<button class="btn-action btn-gang" onclick="doAnGang()">暗槓</button>`;
  if (actions.includes('SELF_DRAW_WIN')) bar.innerHTML += `<button class="btn-action btn-win" onclick="act('SELF_DRAW_WIN')">自摸 🎉</button>`;
  if (actions.includes('WIN'))           bar.innerHTML += `<button class="btn-action btn-win" onclick="act('WIN')">胡牌 🎉</button>`;
  if (actions.includes('PASS'))          bar.innerHTML += `<button class="btn-action btn-pass" onclick="act('PASS')">過</button>`;
}

function selectTile(id) {
  const hand = gameState.players[0].hand;
  const t = hand.find(x => x.id === id);
  selectedTile = (selectedTile?.id === id) ? null : t;
  document.getElementById('hand-south').innerHTML = hand.map(t => renderTile(t, false, true)).join('');
}

function doDiscard() {
  if (!selectedTile) { alert('請選擇要打出的牌'); return; }
  act('DISCARD', {tileId: selectedTile.id});
  selectedTile = null;
}

function doChi() {
  if (!selectedTile) { alert('請先點選一張手牌'); return; }
  const discard = gameState.lastDiscard;
  const hand    = gameState.players[0].hand;
  const v=discard.value, s=discard.suit;
  const sv=selectedTile.value;
  const pats=[[v-2,v-1],[v-1,v+1],[v+1,v+2]];
  for (const [v1,v2] of pats) {
    if (v1<1||v2>9) continue;
    const t1=hand.find(t=>t.suit===s&&t.value===v1);
    const t2=hand.find(t=>t.suit===s&&t.value===v2&&t!==t1);
    if (t1&&t2&&(t1.id===selectedTile.id||t2.id===selectedTile.id)) {
      act('CHI', {chiTileIds:[t1.id,t2.id]}); selectedTile=null; return;
    }
  }
  alert('無法組成順子');
}

function doAnGang() {
  if (!selectedTile) { alert('請選擇要暗槓的牌'); return; }
  act('AN_GANG', {tileId: selectedTile.id}); selectedTile=null;
}

async function act(type, extra={}) {
  prevScores = gameState.players.map(p => p.score);
  const res = await apiFetch(API + '/game/' + roomId + '/action', {
    method:'POST', body: JSON.stringify({type, ...extra})
  });
  if (!res?.ok) return;
  gameState = await res.json();
  renderGame();
}

async function nextRound() {
  document.getElementById('overlay-settle').classList.remove('show');
  const res = await apiFetch(API + '/game/' + roomId + '/next-round', {method:'POST'});
  if (!res?.ok) return;
  gameState = await res.json();
  renderGame();
}

function showSettlement() {
  const gs = gameState;
  document.getElementById('overlay-settle').classList.add('show');
  document.getElementById('settle-title').textContent =
    gs.exhaustiveDraw ? '🃏 流局' :
    (gs.winnerIndex>=0 ? gs.players[gs.winnerIndex].name + ' 胡牌！' : '結算');

  const wr = gs.lastWinResult;
  document.getElementById('settle-fans').innerHTML = wr ? [
    ...wr.fanList.map(f=>`<div class="fan-item"><span>${f.name}</span><span style="color:var(--gold)">${f.fan}番</span></div>`),
    `<div class="fan-total"><span>合計</span><span>${wr.totalFan}番</span></div>`
  ].join('') : '';

  document.getElementById('settle-scores').innerHTML = gs.players.map((p,i)=>{
    const d = p.score - (prevScores[i]||p.score);
    return `<div class="score-row"><span>${p.name}</span>
      <span class="${d>0?'pos':d<0?'neg':''}">${d>0?'+':''}${d}</span>
      <span style="color:var(--gold)">${p.score?.toLocaleString()}</span></div>`;
  }).join('');

  const btn = document.getElementById('btn-next-round');
  btn.style.display = (gs.phase==='GAME_OVER') ? 'none' : '';
}

async function leaveGame() {
  if (roomId) {
    await apiFetch(API + '/rooms/' + roomId + '/leave', {method:'POST'});
    if (stompClient?.connected) {
      stompClient.send('/app/room/' + roomId + '/leave', {}, '{}');
    }
  }
  hangup();
  document.getElementById('overlay-settle').classList.remove('show');
  roomId = null; gameState = null;
  showPage('lobby'); loadRooms();
}

// ══════════════════════════════════════════════
//  Chat
// ══════════════════════════════════════════════
function sendChat() {
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text || !stompClient?.connected || !roomId) return;
  stompClient.send('/app/room/' + roomId + '/chat', {}, JSON.stringify({
    type: 'TEXT',
    content: text,
    senderName: currentUser?.username,
    senderAvatar: currentUser?.avatarUrl
  }));
  input.value = '';
}

function addChatMsg(sender, content, type='other') {
  const div = document.createElement('div');
  div.className = `chat-msg ${type}`;
  div.innerHTML = (type!=='system'?`<div class="sender">${sender}</div>`:'') +
    `<div class="bubble">${content}</div>`;
  const msgs = document.getElementById('chat-messages');
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

// ══════════════════════════════════════════════
//  WebRTC — Camera / Voice
// ══════════════════════════════════════════════
async function toggleCamera() {
  if (camOn) { stopCamera(); return; }
  try {
    localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:micOn});
    document.getElementById('vid-0').srcObject = localStream;
    camOn = true;
    document.getElementById('btn-cam').classList.add('active');
    document.getElementById('btn-hangup').style.display = '';
    announcePresence();
  } catch(e) { alert('無法開啟攝影機: ' + e.message); }
}

async function toggleMic() {
  if (!localStream) {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({video:false, audio:true});
      micOn = true;
    } catch(e) { alert('無法開啟麥克風: ' + e.message); return; }
  } else {
    localStream.getAudioTracks().forEach(t => t.enabled = !t.enabled);
    micOn = localStream.getAudioTracks()[0]?.enabled || false;
  }
  document.getElementById('btn-mic').classList.toggle('active', micOn);
}

function stopCamera() {
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  document.getElementById('vid-0').srcObject = null;
  camOn = false; micOn = false;
  document.getElementById('btn-cam').classList.remove('active');
  document.getElementById('btn-mic').classList.remove('active');
}

function hangup() {
  stopCamera();
  Object.keys(peers).forEach(closePeer);
  document.getElementById('btn-hangup').style.display = 'none';
}

function announcePresence() {
  if (!stompClient?.connected || !roomId) return;
  stompClient.send('/app/room/' + roomId + '/join', {}, JSON.stringify({
    username: currentUser?.username, avatarUrl: currentUser?.avatarUrl||''
  }));
}

// ── Peer connection ────────────────────────────
function initPeer(peerId, initiator) {
  if (peers[peerId]) return;
  const pc = new RTCPeerConnection({iceServers: ICE_SERVERS});
  peers[peerId] = pc;

  // Add local tracks
  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  // Remote stream → assign to a video slot
  pc.ontrack = e => {
    const slot = getSlotForPeer(peerId);
    if (slot) slot.srcObject = e.streams[0];
  };

  // ICE candidates
  pc.onicecandidate = e => {
    if (e.candidate) sendSignal(peerId, {type:'ice', candidate: e.candidate});
  };

  if (initiator) {
    pc.createOffer().then(offer => {
      pc.setLocalDescription(offer);
      sendSignal(peerId, {type:'offer', sdp: offer});
    });
  }
}

async function handleSignal(msg) {
  const peerId = msg.senderId;
  if (peerId === currentUser?.id) return;

  if (!peers[peerId]) initPeer(peerId, false);
  const pc = peers[peerId];

  if (msg.signal?.type === 'offer') {
    await pc.setRemoteDescription(msg.signal.sdp);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    sendSignal(peerId, {type:'answer', sdp: answer});
  } else if (msg.signal?.type === 'answer') {
    await pc.setRemoteDescription(msg.signal.sdp);
  } else if (msg.signal?.type === 'ice') {
    await pc.addIceCandidate(msg.signal.candidate);
  }
}

function sendSignal(targetId, signal) {
  if (!stompClient?.connected || !roomId) return;
  stompClient.send('/app/room/' + roomId + '/signal', {}, JSON.stringify({
    targetId, signal, senderId: currentUser?.id
  }));
}

function closePeer(peerId) {
  if (peers[peerId]) { peers[peerId].close(); delete peers[peerId]; }
  const slot = getSlotForPeer(peerId);
  if (slot) slot.srcObject = null;
}

function getSlotForPeer(peerId) {
  // Map peer to video slot 1-3 (slot 0 = self)
  const peerList = Object.keys(peers);
  const idx = peerList.indexOf(peerId);
  if (idx < 0 || idx > 2) return null;
  return document.getElementById('vid-' + (idx+1));
}

// ══════════════════════════════════════════════
//  UI helpers
// ══════════════════════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
}

function switchSidebar(tab) {
  document.getElementById('sidebar-video').style.display = tab==='video' ? 'flex' : 'none';
  document.getElementById('sidebar-chat').style.display  = tab==='chat'  ? 'flex' : 'none';
  document.querySelectorAll('.sidebar-tab').forEach((el,i) =>
    el.classList.toggle('active', ['video','chat'][i] === tab));
}
