<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🀄 中國麻將大廳</title>
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
:root {
  --felt: #0f3d20; --felt-light: #165a2f; --gold: #d4a843; --gold-light: #f0c960;
  --panel: rgba(5,20,10,0.9); --border: rgba(212,168,67,0.3);
  --text: #e8f5e9; --dim: #7a9b7a; --red: #c0392b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: radial-gradient(ellipse at 50% 50%, #1a6b38 0%, #0f3d20 100%);
  font-family: 'Noto Serif TC', serif;
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
}

/* ── AUTH SCREEN ── */
#auth-screen {
  display: flex; align-items: center; justify-content: center;
  height: 100vh;
}
.auth-box {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 42px 48px;
  width: 360px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}
.auth-box h1 { font-family:'Ma Shan Zheng',serif; font-size:48px; color:var(--gold); margin-bottom:4px; }
.auth-box p  { font-size:12px; color:var(--dim); margin-bottom:28px; }
.tabs { display:flex; gap:0; margin-bottom:24px; border-radius:8px; overflow:hidden; border:1px solid var(--border); }
.tab { flex:1; padding:9px; background:transparent; border:none; color:var(--dim); cursor:pointer; font-family:inherit; font-size:14px; transition:all .2s; }
.tab.active { background:rgba(212,168,67,0.2); color:var(--gold); font-weight:bold; }
.field { width:100%; background:rgba(0,0,0,0.4); border:1px solid var(--border); border-radius:8px; padding:10px 14px; color:var(--text); font-family:inherit; font-size:14px; margin-bottom:12px; outline:none; transition:border-color .2s; }
.field:focus { border-color:var(--gold); }
.btn-gold { width:100%; padding:12px; background:linear-gradient(135deg,#8b6500,#d4a843); border:none; border-radius:8px; color:#000; font-family:inherit; font-size:16px; font-weight:900; cursor:pointer; margin-top:4px; transition:opacity .15s; }
.btn-gold:hover { opacity:.9; }
.err { color:#e74c3c; font-size:12px; min-height:18px; margin-top:8px; }

/* ── LOBBY SCREEN ── */
#lobby-screen {
  display: none;
  height: 100vh;
  grid-template-columns: 240px 1fr 280px;
  grid-template-rows: 56px 1fr;
  grid-template-areas: "header header header" "sidebar main chat";
}
#lobby-screen.active { display: grid; }

/* Header */
.header {
  grid-area: header;
  background: rgba(0,0,0,0.6);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px;
}
.header-title { font-family:'Ma Shan Zheng',serif; font-size:26px; color:var(--gold); }
.header-user { margin-left:auto; display:flex; align-items:center; gap:10px; font-size:13px; }
.chips { color:var(--gold); font-weight:bold; }
.btn-sm { padding:6px 14px; border:1px solid var(--border); border-radius:6px; background:transparent; color:var(--dim); cursor:pointer; font-family:inherit; font-size:12px; }
.btn-sm:hover { border-color:var(--gold); color:var(--gold); }

/* Sidebar — player list */
.sidebar {
  grid-area: sidebar;
  background: rgba(0,0,0,0.45);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 14px 0;
}
.sidebar h3 { font-size:11px; color:var(--dim); padding:0 14px 8px; letter-spacing:.08em; text-transform:uppercase; }
.player-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px; cursor: pointer;
  transition: background .15s;
}
.player-item:hover { background: rgba(212,168,67,0.08); }
.avatar { width:32px; height:32px; border-radius:50%; background:var(--felt-light); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.player-name { font-size:13px; font-weight:bold; }
.player-wins { font-size:11px; color:var(--dim); }
.status-dot { width:7px; height:7px; border-radius:50%; margin-left:auto; }
.status-dot.online  { background:#2ecc71; }
.status-dot.playing { background:#f39c12; }
.status-dot.offline { background:#555; }

/* Main area */
.main {
  grid-area: main;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 24px; padding: 32px;
}
.play-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px 48px;
  text-align: center;
  width: 100%; max-width: 420px;
}
.play-card h2 { font-family:'Ma Shan Zheng',serif; font-size:32px; color:var(--gold); margin-bottom:8px; }
.play-card p  { font-size:13px; color:var(--dim); margin-bottom:20px; }
.btn-play { padding:13px 36px; background:linear-gradient(135deg,#8b0000,#c0392b); border:none; border-radius:10px; color:var(--gold-light); font-family:inherit; font-size:18px; font-weight:900; cursor:pointer; box-shadow:0 4px 0 #500000; transition:transform .1s; }
.btn-play:hover { transform:translateY(-2px); }
.btn-play:active { transform:translateY(1px); }
.btn-invite { padding:10px 24px; background:linear-gradient(135deg,#0d4f8c,#1a7acc); border:none; border-radius:8px; color:#fff; font-family:inherit; font-size:14px; cursor:pointer; margin-top:10px; }

/* Stats card */
.stats-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px 28px;
  width: 100%; max-width: 420px;
  display: flex; gap: 20px; justify-content: space-around; text-align:center;
}
.stat-val { font-size:26px; font-weight:900; color:var(--gold); font-family:'Ma Shan Zheng',serif; }
.stat-lbl { font-size:11px; color:var(--dim); margin-top:2px; }

/* Chat panel */
.chat-panel {
  grid-area: chat;
  background: rgba(0,0,0,0.45);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
}
.chat-header { padding:10px 14px; border-bottom:1px solid var(--border); font-size:13px; color:var(--gold); display:flex; align-items:center; gap:8px; }
.chat-messages { flex:1; overflow-y:auto; padding:10px 12px; display:flex; flex-direction:column; gap:6px; }
.chat-msg { font-size:12px; line-height:1.5; }
.chat-msg .sender { color:var(--gold); font-weight:bold; margin-right:4px; }
.chat-msg.system { color:var(--dim); font-style:italic; }
.chat-msg.dm { background:rgba(212,168,67,0.08); border-left:2px solid var(--gold); padding:3px 6px; border-radius:2px; }
.typing-indicator { font-size:11px; color:var(--dim); min-height:16px; padding:0 12px 4px; }
.chat-input-row { display:flex; gap:6px; padding:10px 12px; border-top:1px solid var(--border); }
.chat-input { flex:1; background:rgba(0,0,0,0.4); border:1px solid var(--border); border-radius:6px; padding:7px 10px; color:var(--text); font-family:inherit; font-size:13px; outline:none; }
.chat-input:focus { border-color:var(--gold); }
.send-btn { padding:7px 12px; background:rgba(212,168,67,0.2); border:1px solid var(--border); border-radius:6px; color:var(--gold); cursor:pointer; font-size:13px; }
.send-btn:hover { background:rgba(212,168,67,0.35); }

/* Invite toast */
.invite-toast {
  position:fixed; bottom:24px; right:24px; z-index:999;
  background:rgba(0,0,0,0.9); border:1px solid var(--gold);
  border-radius:12px; padding:16px 20px; max-width:280px;
  animation: slideIn .3s ease;
}
@keyframes slideIn { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
.invite-toast h4 { color:var(--gold); font-size:15px; margin-bottom:6px; }
.invite-toast p  { color:var(--dim); font-size:12px; margin-bottom:12px; }
.invite-btns { display:flex; gap:8px; }
.btn-accept { flex:1; padding:8px; background:linear-gradient(135deg,#085c2a,#15803d); border:none; border-radius:6px; color:#fff; cursor:pointer; font-family:inherit; font-weight:bold; }
.btn-decline { flex:1; padding:8px; background:rgba(255,255,255,0.05); border:1px solid #555; border-radius:6px; color:#999; cursor:pointer; font-family:inherit; }

/* Records modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:500; display:flex; align-items:center; justify-content:center; }
.records-modal { background:linear-gradient(160deg,#0a2015,#051009); border:1px solid var(--border); border-radius:16px; padding:28px 32px; width:500px; max-height:70vh; overflow-y:auto; }
.records-modal h2 { font-family:'Ma Shan Zheng',serif; font-size:28px; color:var(--gold); margin-bottom:16px; }
.record-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.06); font-size:13px; }
.record-row .win  { color:#2ecc71; font-weight:bold; }
.record-row .loss { color:#e74c3c; font-weight:bold; }
.record-row .draw { color:var(--dim); }
.close-btn { float:right; padding:6px 14px; background:transparent; border:1px solid var(--border); border-radius:6px; color:var(--dim); cursor:pointer; font-family:inherit; margin-bottom:12px; }

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:rgba(212,168,67,0.2); border-radius:2px; }
</style>
</head>
<body>

<!-- ── AUTH ── -->
<div id="auth-screen">
  <div class="auth-box">
    <h1>🀄</h1>
    <p>中國麻將線上平台</p>
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">登入</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">註冊</button>
    </div>
    <div id="form-login">
      <input class="field" id="login-user" placeholder="用戶名" type="text" autocomplete="username">
      <input class="field" id="login-pass" placeholder="密碼" type="password" autocomplete="current-password">
      <button class="btn-gold" onclick="doLogin()">登入</button>
    </div>
    <div id="form-register" style="display:none">
      <input class="field" id="reg-user"    placeholder="用戶名 (2-20字)" type="text">
      <input class="field" id="reg-display" placeholder="顯示名稱 (選填)" type="text">
      <input class="field" id="reg-pass"    placeholder="密碼 (至少4字)" type="password">
      <button class="btn-gold" onclick="doRegister()">建立帳號</button>
    </div>
    <div class="err" id="auth-err"></div>
  </div>
</div>

<!-- ── LOBBY ── -->
<div id="lobby-screen">
  <!-- Header -->
  <div class="header">
    <span class="header-title">🀄 麻將大廳</span>
    <div class="header-user">
      <span id="hdr-name"></span>
      <span class="chips">💰 <span id="hdr-chips">0</span></span>
      <button class="btn-sm" onclick="showRecords()">戰績</button>
      <button class="btn-sm" onclick="doLogout()">登出</button>
    </div>
  </div>

  <!-- Sidebar: online players -->
  <div class="sidebar">
    <h3>在線玩家</h3>
    <div id="player-list"></div>
  </div>

  <!-- Main: play buttons + stats -->
  <div class="main">
    <div class="play-card">
      <h2>單人對戰</h2>
      <p>對戰三個電腦 AI，隨時可玩</p>
      <button class="btn-play" onclick="startSoloGame()">開始遊戲</button>
    </div>
    <div class="stats-card" id="stats-card">
      <div><div class="stat-val" id="st-wins">0</div><div class="stat-lbl">勝場</div></div>
      <div><div class="stat-val" id="st-rate">0%</div><div class="stat-lbl">勝率</div></div>
      <div><div class="stat-val" id="st-chips">0</div><div class="stat-lbl">籌碼</div></div>
      <div><div class="stat-val" id="st-games">0</div><div class="stat-lbl">總場</div></div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-panel">
    <div class="chat-header">💬 大廳聊天</div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="typing-indicator" id="typing-indicator"></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" placeholder="輸入訊息…" maxlength="200"
        onkeydown="if(event.key==='Enter')sendChat()" oninput="sendTyping()">
      <button class="send-btn" onclick="sendChat()">送出</button>
    </div>
  </div>
</div>

<!-- Invite toast (dynamic) -->
<div id="invite-container"></div>

<!-- Records modal -->
<div id="records-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeRecords()">
  <div class="records-modal">
    <button class="close-btn" onclick="closeRecords()">關閉</button>
    <h2>我的戰績</h2>
    <div id="records-list"></div>
  </div>
</div>

<script>
/* ── Config ── */
const API = '';   // same-origin
let token = localStorage.getItem('mj_token');
let me    = JSON.parse(localStorage.getItem('mj_user') || 'null');
let socket = null;
let typingTimer = null;

/* ── Helpers ── */
async function api(path, method='GET', body=null) {
  const res = await fetch(API + '/api' + path, {
    method,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || '請求失敗');
  return data;
}

/* ── Auth ── */
function switchTab(t) {
  document.getElementById('tab-login').classList.toggle('active', t==='login');
  document.getElementById('tab-register').classList.toggle('active', t==='register');
  document.getElementById('form-login').style.display    = t==='login'    ? '' : 'none';
  document.getElementById('form-register').style.display = t==='register' ? '' : 'none';
  document.getElementById('auth-err').textContent = '';
}

async function doLogin() {
  try {
    const r = await api('/auth/login','POST',{
      username: document.getElementById('login-user').value,
      password: document.getElementById('login-pass').value,
    });
    saveAuth(r); enterLobby();
  } catch(e) { document.getElementById('auth-err').textContent = e.message; }
}

async function doRegister() {
  try {
    const r = await api('/auth/register','POST',{
      username:    document.getElementById('reg-user').value,
      displayName: document.getElementById('reg-display').value || undefined,
      password:    document.getElementById('reg-pass').value,
    });
    saveAuth(r); enterLobby();
  } catch(e) { document.getElementById('auth-err').textContent = e.message; }
}

function saveAuth(r) {
  token = r.access_token;
  me    = r.user;
  localStorage.setItem('mj_token', token);
  localStorage.setItem('mj_user', JSON.stringify(me));
}

async function doLogout() {
  try { await api('/auth/logout','POST'); } catch {}
  token = null; me = null;
  localStorage.removeItem('mj_token');
  localStorage.removeItem('mj_user');
  if (socket) { socket.disconnect(); socket = null; }
  document.getElementById('lobby-screen').classList.remove('active');
  document.getElementById('auth-screen').style.display = 'flex';
}

/* ── Enter Lobby ── */
async function enterLobby() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('lobby-screen').classList.add('active');
  document.getElementById('hdr-name').textContent = me.displayName;
  loadStats();
  connectSocket();
}

async function loadStats() {
  try {
    const [userData, stats] = await Promise.all([
      api('/users/me'),
      api('/records/my/stats'),
    ]);
    document.getElementById('hdr-chips').textContent = userData.chips.toLocaleString();
    document.getElementById('st-wins').textContent   = stats.wins;
    document.getElementById('st-rate').textContent   = stats.winRate + '%';
    document.getElementById('st-chips').textContent  = stats.totalChips >= 0 ? '+'+stats.totalChips : stats.totalChips;
    document.getElementById('st-games').textContent  = stats.totalGames;
  } catch {}
}

/* ── WebSocket ── */
function connectSocket() {
  socket = io('/ws', { auth: { token } });

  socket.on('connect', () => console.log('WS connected'));

  socket.on('users:online', players => renderPlayerList(players));
  socket.on('user:joined',  u => addSystemMsg(`${u.displayName} 進入大廳`));
  socket.on('user:left',    u => addSystemMsg(`${u.displayName} 離開大廳`));

  socket.on('chat:history', msgs => {
    document.getElementById('chat-messages').innerHTML = '';
    msgs.forEach(m => addChatMsg(m));
  });
  socket.on('chat:message', m => addChatMsg(m));
  socket.on('chat:dm',      m => addDmMsg(m));
  socket.on('chat:typing',  ({displayName}) => showTyping(displayName));

  socket.on('invite:received', inv => showInviteToast(inv));
  socket.on('invite:accepted', ({fromId, gameRoomId, respondedBy}) => {
    addSystemMsg(`${respondedBy} 接受了邀請！`);
  });
  socket.on('invite:declined', ({respondedBy}) => {
    addSystemMsg(`${respondedBy} 拒絕了邀請`);
  });
}

/* ── Chat ── */
function addChatMsg(m) {
  const el = document.createElement('div');
  el.className = 'chat-msg' + (m.senderId === me?.id ? ' mine' : '');
  el.innerHTML = `<span class="sender">${esc(m.senderName)}</span>${esc(m.content)}`;
  appendMsg(el);
}
function addDmMsg(m) {
  const el = document.createElement('div');
  el.className = 'chat-msg dm';
  const who = m.senderId === me?.id ? '→ DM' : `DM from ${esc(m.senderName)}`;
  el.innerHTML = `<span class="sender">${who}</span>${esc(m.content)}`;
  appendMsg(el);
}
function addSystemMsg(txt) {
  const el = document.createElement('div');
  el.className = 'chat-msg system';
  el.textContent = txt;
  appendMsg(el);
}
function appendMsg(el) {
  const box = document.getElementById('chat-messages');
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}
function sendChat() {
  const inp = document.getElementById('chat-input');
  const content = inp.value.trim();
  if (!content || !socket) return;
  socket.emit('chat:lobby', { content });
  inp.value = '';
}
let typingTimeout;
function sendTyping() {
  if (!socket) return;
  clearTimeout(typingTimeout);
  socket.emit('chat:typing');
  typingTimeout = setTimeout(()=>{}, 1500);
}
function showTyping(name) {
  const el = document.getElementById('typing-indicator');
  el.textContent = name + ' 正在輸入…';
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => el.textContent = '', 2000);
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Player List ── */
function renderPlayerList(players) {
  const el = document.getElementById('player-list');
  el.innerHTML = players.map(p => `
    <div class="player-item" onclick="openPlayerMenu(${p.id},'${esc(p.displayName)}')">
      <div class="avatar">${esc(p.displayName[0])}</div>
      <div>
        <div class="player-name">${esc(p.displayName)}</div>
        <div class="player-wins">${p.wins}勝</div>
      </div>
      <div class="status-dot ${p.status}"></div>
    </div>
  `).join('');
}

function openPlayerMenu(toId, name) {
  if (toId === me?.id) return;
  const action = confirm(`【${name}】\n[確認] 邀請對戰\n[取消] 關閉`);
  if (action) sendInvite(toId);
}

/* ── Invite ── */
function sendInvite(toId) {
  if (!socket) return;
  socket.emit('invite:send', { toId });
  addSystemMsg('已送出邀請…');
}

function showInviteToast(inv) {
  const id = 'inv-' + inv.id;
  const el = document.createElement('div');
  el.id = id;
  el.className = 'invite-toast';
  el.innerHTML = `
    <h4>🀄 遊戲邀請</h4>
    <p>${esc(inv.fromName)} 邀請你一起打麻將！</p>
    <div class="invite-btns">
      <button class="btn-accept"  onclick="respondInvite(${inv.id},true,'${id}')">接受</button>
      <button class="btn-decline" onclick="respondInvite(${inv.id},false,'${id}')">拒絕</button>
    </div>
  `;
  document.getElementById('invite-container').appendChild(el);
  setTimeout(() => el.remove(), 30000);
}

function respondInvite(inviteId, accept, domId) {
  if (!socket) return;
  socket.emit('invite:respond', { inviteId, accept });
  document.getElementById(domId)?.remove();
}

/* ── Solo Game ── */
function startSoloGame() {
  // Open game.html (the existing mahjong game)
  // Pass JWT token via sessionStorage for game to pick up and report results
  sessionStorage.setItem('mj_token', token);
  sessionStorage.setItem('mj_user', JSON.stringify(me));
  window.location.href = '/game.html';
}

/* ── Records ── */
async function showRecords() {
  document.getElementById('records-modal').style.display = 'flex';
  try {
    const records = await api('/records/my');
    const el = document.getElementById('records-list');
    if (!records.length) { el.innerHTML = '<p style="color:var(--dim);font-size:13px">尚無戰績</p>'; return; }
    el.innerHTML = records.map(r => `
      <div class="record-row">
        <span class="${r.result}">${r.result==='win'?'勝':r.result==='loss'?'敗':'和'}</span>
        <span style="color:var(--dim);font-size:12px">${r.winType||'—'} ${r.winFan?r.winFan+'番':''}</span>
        <span style="color:${r.chipDelta>=0?'#2ecc71':'#e74c3c'}">${r.chipDelta>=0?'+':''}${r.chipDelta}</span>
        <span style="color:var(--dim);font-size:11px">${new Date(r.playedAt).toLocaleDateString('zh-TW')}</span>
      </div>
    `).join('');
  } catch(e) { document.getElementById('records-list').innerHTML = '<p style="color:#e74c3c">載入失敗</p>'; }
}
function closeRecords() { document.getElementById('records-modal').style.display = 'none'; }
