<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>真實太陽系模擬</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: black; font-family: Arial, sans-serif; }
    canvas { display: block; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 15px;
      border-radius: 5px;
      font-size: 14px;
      max-width: 250px;
    }
    #controls {
      position: absolute;
      top: 10px;
      right: 10px;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 15px;
      border-radius: 5px;
    }
    .control-item {
      margin: 10px 0;
    }
    label {
      display: block;
      margin-bottom: 5px;
    }
    input[type="range"] {
      width: 200px;
    }
  </style>
</head>
<body>
<div id="info">
  <h3 style="margin-top:0">太陽系模擬</h3>
  <p>🖱️ 拖曳旋轉視角<br>
  🔍 滾輪縮放<br>
  ⚡ 調整右側參數</p>
</div>

<div id="controls">
  <div class="control-item">
    <label>公轉速度: <span id="speedValue">1.0</span>x</label>
    <input type="range" id="speedSlider" min="0" max="50" value="10" step="1">
  </div>
  <div class="control-item">
    <label>太陽亮度: <span id="brightnessValue">2.0</span></label>
    <input type="range" id="brightnessSlider" min="5" max="50" value="20" step="1">
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// === 場景設置 ===
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 3000);
camera.position.set(0, 100, 250);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// === 簡易軌道控制 ===
let isDragging = false;
let previousMousePosition = { x: 0, y: 0 };
let cameraRotation = { x: 0, y: 0 };

renderer.domElement.addEventListener('mousedown', (e) => {
  isDragging = true;
  previousMousePosition = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('mousemove', (e) => {
  if (isDragging) {
    const deltaX = e.clientX - previousMousePosition.x;
    const deltaY = e.clientY - previousMousePosition.y;
    
    cameraRotation.y += deltaX * 0.005;
    cameraRotation.x += deltaY * 0.005;
    cameraRotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, cameraRotation.x));
    
    previousMousePosition = { x: e.clientX, y: e.clientY };
  }
});

renderer.domElement.addEventListener('mouseup', () => {
  isDragging = false;
});

renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  const distance = camera.position.length();
  const newDistance = distance + e.deltaY * 0.1;
  const clampedDistance = Math.max(50, Math.min(800, newDistance));
  camera.position.multiplyScalar(clampedDistance / distance);
});

// === 光源 ===
const ambient = new THREE.AmbientLight(0x222222);
scene.add(ambient);

const sunLight = new THREE.PointLight(0xffffff, 2, 2000);
scene.add(sunLight);

// === 星空背景 ===
const starGeometry = new THREE.BufferGeometry();
const starVertices = [];
for (let i = 0; i < 5000; i++) {
  const x = (Math.random() - 0.5) * 2000;
  const y = (Math.random() - 0.5) * 2000;
  const z = (Math.random() - 0.5) * 2000;
  starVertices.push(x, y, z);
}
starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 1 });
const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// === 太陽 ===
const sun = new THREE.Mesh(
  new THREE.SphereGeometry(15, 64, 64),
  new THREE.MeshBasicMaterial({ color: 0xffaa00, emissive: 0xff8800, emissiveIntensity: 1 })
);
scene.add(sun);

// 太陽光暈
const glowGeometry = new THREE.SphereGeometry(18, 32, 32);
const glowMaterial = new THREE.MeshBasicMaterial({
  color: 0xffaa00,
  transparent: true,
  opacity: 0.3
});
const glow = new THREE.Mesh(glowGeometry, glowMaterial);
scene.add(glow);

// === 行星資料 ===
const planets = [
  { name: '水星', size: 1.5, orbitX: 25, orbitZ: 22, speed: 0.04, tilt: 7, color: 0x8c7853 },
  { name: '金星', size: 2.3, orbitX: 35, orbitZ: 32, speed: 0.015, tilt: 3.4, color: 0xffc649 },
  { name: '地球', size: 2.5, orbitX: 48, orbitZ: 45, speed: 0.01, tilt: 0, color: 0x4169e1 },
  { name: '火星', size: 1.8, orbitX: 65, orbitZ: 60, speed: 0.008, tilt: 1.85, color: 0xcd5c5c },
  { name: '木星', size: 8, orbitX: 95, orbitZ: 88, speed: 0.004, tilt: 1.3, color: 0xdaa520 },
  { name: '土星', size: 7, orbitX: 125, orbitZ: 115, speed: 0.003, tilt: 2.5, color: 0xf4a460, ring: true },
  { name: '天王星', size: 4.5, orbitX: 160, orbitZ: 148, speed: 0.002, tilt: 0.77, color: 0x4fd0e0, ring: true },
  { name: '海王星', size: 4.3, orbitX: 185, orbitZ: 172, speed: 0.0015, tilt: 1.8, color: 0x4169e1 }
];

// === 建立行星 ===
const planetMeshes = [];
planets.forEach(p => {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(p.size, 32, 32),
    new THREE.MeshPhongMaterial({ 
      color: p.color,
      shininess: 30,
      specular: 0x333333
    })
  );
  mesh.rotation.x = THREE.MathUtils.degToRad(p.tilt);
  scene.add(mesh);

  // 軌道線
  const curve = new THREE.EllipseCurve(0, 0, p.orbitX, p.orbitZ, 0, Math.PI * 2, false, 0);
  const points = curve.getPoints(128).map(pt => new THREE.Vector3(pt.x, 0, pt.y));
  const orbitGeometry = new THREE.BufferGeometry().setFromPoints(points);
  const orbitLine = new THREE.LineLoop(orbitGeometry, new THREE.LineBasicMaterial({ 
    color: 0x88aaff,
    transparent: true,
    opacity: 0.7
  }));
  scene.add(orbitLine);

  // 行星環
  if (p.ring) {
    const ringGeo = new THREE.RingGeometry(p.size * 1.3, p.size * 2.2, 64);
    const ringMat = new THREE.MeshBasicMaterial({ 
      color: 0xcccccc, 
      side: THREE.DoubleSide, 
      transparent: true, 
      opacity: 0.5 
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    mesh.add(ring);
  }

  p.angle = Math.random() * Math.PI * 2;
  p.mesh = mesh;
  planetMeshes.push(p);
});

// === 小行星帶 ===
const asteroidGroup = new THREE.Group();
for (let i = 0; i < 800; i++) {
  const a = new THREE.Mesh(
    new THREE.SphereGeometry(Math.random() * 0.3 + 0.1, 6, 6),
    new THREE.MeshLambertMaterial({ color: 0x888888 })
  );
  const angle = Math.random() * Math.PI * 2;
  const radius = 75 + Math.random() * 15;
  a.position.set(
    Math.cos(angle) * radius, 
    (Math.random() - 0.5) * 6, 
    Math.sin(angle) * radius
  );
  asteroidGroup.add(a);
}
scene.add(asteroidGroup);

// === 流星 ===
const meteors = [];
for (let i = 0; i < 25; i++) {
  const points = [new THREE.Vector3(0, 0, 0), new THREE.Vector3(2, 5, 2)];
  const g = new THREE.BufferGeometry().setFromPoints(points);
  const m = new THREE.Line(g, new THREE.LineBasicMaterial({ 
    color: 0xffffff,
    transparent: true,
    opacity: 0.8
  }));
  m.position.set(
    Math.random() * 400 - 200, 
    Math.random() * 200 + 100, 
    Math.random() * 400 - 200
  );
  m.velocity = {
    x: -(Math.random() * 2 + 1),
    y: -(Math.random() * 2 + 1),
    z: -(Math.random() * 0.5)
  };
  meteors.push(m);
  scene.add(m);
}

// === 控制參數 ===
const params = {
  speedScale: 1.0,
  sunBrightness: 2.0
};

document.getElementById('speedSlider').addEventListener('input', (e) => {
  params.speedScale = e.target.value / 10;
  document.getElementById('speedValue').textContent = params.speedScale.toFixed(1);
});

document.getElementById('brightnessSlider').addEventListener('input', (e) => {
  params.sunBrightness = e.target.value / 10;
  document.getElementById('brightnessValue').textContent = params.sunBrightness.toFixed(1);
});

// === 動畫循環 ===
function animate() {
  requestAnimationFrame(animate);

  // 更新相機位置
  const distance = camera.position.length();
  camera.position.x = distance * Math.sin(cameraRotation.y) * Math.cos(cameraRotation.x);
  camera.position.y = distance * Math.sin(cameraRotation.x);
  camera.position.z = distance * Math.cos(cameraRotation.y) * Math.cos(cameraRotation.x);
  camera.lookAt(0, 0, 0);

  // 太陽自轉
  sun.rotation.y += 0.001;
  glow.rotation.y -= 0.0005;
  sunLight.intensity = params.sunBrightness;

  // 行星公轉與自轉
  planetMeshes.forEach(p => {
    p.angle += p.speed * params.speedScale * 0.01;
    const x = Math.cos(p.angle) * p.orbitX;
    const z = Math.sin(p.angle) * p.orbitZ;
    p.mesh.position.set(x, 0, z);
    p.mesh.rotation.y += 0.01;
  });

  // 小行星帶旋轉
  asteroidGroup.rotation.y += 0.0002 * params.speedScale;

  // 流星運動
  meteors.forEach(m => {
    m.position.x += m.velocity.x;
    m.position.y += m.velocity.y;
    m.position.z += m.velocity.z;
    
    if (m.position.y < -50) {
      m.position.set(
        Math.random() * 400 - 200, 
        Math.random() * 100 + 150, 
        Math.random() * 400 - 200
      );
    }
  });

  renderer.render(scene, camera);
}
animate();

// === 響應式視窗 ===
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
