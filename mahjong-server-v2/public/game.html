<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🀄 中國麻將</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --felt: #0f3d20;
  --felt-light: #165a2f;
  --felt-center: #1a6b38;
  --gold: #d4a843;
  --gold-light: #f0c960;
  --ivory: #fdf6e3;
  --ivory-shadow: #e8d9a0;
  --tile-border: #8b6914;
  --red: #c0392b;
  --blue-tile: #1a3a7a;
  --text-dim: #7a9b7a;
  --text-bright: #e8f5e9;
  --panel-bg: rgba(0,0,0,0.55);
  --shadow-deep: 0 4px 20px rgba(0,0,0,0.7);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--felt);
  font-family: 'Noto Serif TC', serif;
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ── TABLE LAYOUT ─────────────────────────────────── */
#root { width: 100vw; height: 100vh; }

.table {
  width: 100vw;
  height: 100vh;
  display: grid;
  grid-template-columns: 130px 1fr 130px;
  grid-template-rows: 130px 1fr 180px;
  grid-template-areas:
    ". top ."
    "left center right"
    ". bottom .";
  background:
    radial-gradient(ellipse 70% 70% at 50% 50%, var(--felt-center) 0%, var(--felt) 100%);
  position: relative;
  gap: 0;
}

/* Felt texture overlay */
.table::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px),
    repeating-linear-gradient(-45deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px);
  pointer-events: none;
  z-index: 0;
}

/* Table border */
.table::after {
  content: '';
  position: absolute;
  inset: 6px;
  border: 2px solid rgba(212,168,67,0.25);
  border-radius: 16px;
  pointer-events: none;
  z-index: 0;
}

/* ── TILE ─────────────────────────────────── */
.tile {
  width: 38px;
  height: 52px;
  background: linear-gradient(160deg, #fffce8 0%, #f5e6a3 60%, #e8d080 100%);
  border: 1.5px solid var(--tile-border);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
  transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
  box-shadow:
    2px 3px 0 #8b6914,
    2px 3px 6px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.9);
  line-height: 1.1;
  text-align: center;
  white-space: nowrap;
}

.tile:hover:not(.no-hover) {
  transform: translateY(-8px) scale(1.04);
  box-shadow: 2px 10px 0 #6b4f0a, 2px 10px 14px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.9);
  z-index: 10;
}

.tile.selected {
  transform: translateY(-14px) scale(1.05);
  border-color: var(--gold-light);
  box-shadow: 0 0 0 2px var(--gold-light), 2px 12px 0 #6b4f0a, 0 16px 20px rgba(0,0,0,0.5);
  z-index: 20;
}

.tile.face-down {
  background: linear-gradient(160deg, #2040a0 0%, #152878 60%, #0d1e5a 100%);
  border-color: #4a6acc;
  box-shadow: 2px 3px 0 #0d1e5a, 2px 3px 6px rgba(0,0,0,0.5), inset 0 1px 0 rgba(100,140,255,0.3);
  cursor: default;
}

.tile.face-down::after {
  content: '🀫';
  font-size: 20px;
  opacity: 0.6;
}

.tile.highlight-discard {
  border-color: var(--gold-light);
  box-shadow: 0 0 0 2px var(--gold), 0 0 16px rgba(212,168,67,0.6), 2px 3px 6px rgba(0,0,0,0.4);
  animation: goldPulse 1s infinite alternate;
}

@keyframes goldPulse {
  from { box-shadow: 0 0 0 2px var(--gold), 0 0 10px rgba(212,168,67,0.4); }
  to   { box-shadow: 0 0 0 2px var(--gold-light), 0 0 22px rgba(212,168,67,0.8); }
}

.tile.win-tile {
  border-color: #ff4444;
  animation: winPulse 0.4s infinite alternate;
}
@keyframes winPulse {
  from { box-shadow: 0 0 8px #ff4444; transform: scale(1); }
  to   { box-shadow: 0 0 20px #ff4444; transform: scale(1.06); }
}

.tile.new-tile {
  animation: dealIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes dealIn {
  from { transform: scale(0.3) rotate(-20deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* Tile text colors */
.tile.suit-man  { color: #b91c1c; }
.tile.suit-pin  { color: #1d4ed8; }
.tile.suit-sou  { color: #15803d; }
.tile.suit-wind { color: #1c1c1c; font-size: 16px; }
.tile.suit-dragon-red   { color: #b91c1c; font-size: 18px; }
.tile.suit-dragon-green { color: #15803d; font-size: 18px; }
.tile.suit-dragon-white { color: #aaa;    font-size: 10px; border: 2px solid #aaa; }
.tile.suit-flower { color: #b45309; font-size: 10px; }

/* Small tile (in discard piles) */
.tile.sm {
  width: 24px; height: 33px; font-size: 8px;
  box-shadow: 1px 2px 0 #8b6914, 1px 2px 3px rgba(0,0,0,0.4);
  cursor: default;
  border-radius: 3px;
}
.tile.sm:hover:not(.no-hover) { transform: none; }
.tile.sm.face-down::after { font-size: 13px; }

/* Side tile (for left/right players, rotated) */
.tile.side {
  width: 52px; height: 38px;
}
.tile.side.face-down::after { font-size: 20px; }

/* Meld tiles */
.tile.meld {
  width: 28px; height: 40px; font-size: 9px;
  cursor: default;
  box-shadow: 1px 2px 0 #8b6914, 1px 2px 4px rgba(0,0,0,0.4);
}
.tile.meld.side { width: 40px; height: 28px; }

/* ── PLAYER AREAS ─────────────────────────────────── */
.player-area {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 1;
  padding: 6px;
}

.player-area.top {
  grid-area: top;
  flex-direction: column;
  justify-content: flex-end;
  padding-bottom: 8px;
}

.player-area.bottom {
  grid-area: bottom;
  flex-direction: column;
  justify-content: flex-start;
  padding-top: 8px;
  gap: 6px;
}

.player-area.left {
  grid-area: left;
  flex-direction: column;
  justify-content: center;
}

.player-area.right {
  grid-area: right;
  flex-direction: column;
  justify-content: center;
}

/* ── HAND DISPLAY ─────────────────────────────────── */
.hand-row {
  display: flex;
  gap: 2px;
  align-items: flex-end;
  flex-wrap: nowrap;
}

.hand-col {
  display: flex;
  flex-direction: column;
  gap: 2px;
  align-items: center;
}

/* Top player: upside down */
.top-hand { transform: rotate(180deg); }

.drawn-separator {
  width: 2px;
  height: 52px;
  background: linear-gradient(to bottom, transparent, rgba(212,168,67,0.6), transparent);
  margin: 0 3px;
  border-radius: 1px;
}

/* ── DISCARD PILE ─────────────────────────────────── */
.discard-pile {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  padding: 4px;
  background: rgba(0,0,0,0.2);
  border-radius: 4px;
  min-width: 80px;
  min-height: 40px;
  max-width: 190px;
}

.discard-pile.vertical {
  flex-direction: column;
  max-width: 30px;
  max-height: 160px;
  overflow: hidden;
}

/* ── EXPOSED MELDS ─────────────────────────────────── */
.exposed-row {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.meld-group {
  display: flex;
  gap: 1px;
  background: rgba(0,0,0,0.2);
  padding: 2px;
  border-radius: 3px;
  border: 1px solid rgba(212,168,67,0.2);
}

/* ── CENTER ─────────────────────────────────── */
.center {
  grid-area: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  z-index: 1;
}

.wall-panel {
  background: var(--panel-bg);
  border: 1px solid rgba(212,168,67,0.3);
  border-radius: 12px;
  padding: 12px 20px;
  text-align: center;
  backdrop-filter: blur(4px);
  min-width: 150px;
}

.wall-number {
  font-size: 42px;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
  font-family: 'Ma Shan Zheng', serif;
}

.wall-label { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.round-info { font-size: 12px; color: var(--text-bright); margin-top: 4px; }

/* Last discard center display */
.center-discard {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.center-discard-label {
  font-size: 11px;
  color: var(--text-dim);
}

/* ── ACTION BUTTONS ─────────────────────────────────── */
.action-bar {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center;
}

.btn {
  padding: 7px 14px;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Serif TC', serif;
  transition: all 0.12s ease;
  position: relative;
  overflow: hidden;
}

.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0);
  transition: background 0.1s;
}
.btn:hover::after { background: rgba(255,255,255,0.12); }
.btn:active { transform: scale(0.96); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-hu    { background: linear-gradient(135deg, #8b0000, #c0392b); color: var(--gold-light); box-shadow: 0 3px 0 #500000, 0 4px 10px rgba(0,0,0,0.4); }
.btn-pong  { background: linear-gradient(135deg, #0d4f8c, #1a7acc); color: #fff; box-shadow: 0 3px 0 #063366, 0 4px 8px rgba(0,0,0,0.4); }
.btn-chi   { background: linear-gradient(135deg, #085c2a, #15803d); color: #fff; box-shadow: 0 3px 0 #043a1a, 0 4px 8px rgba(0,0,0,0.4); }
.btn-kong  { background: linear-gradient(135deg, #5c4a00, #a07800); color: var(--gold-light); box-shadow: 0 3px 0 #3a2e00, 0 4px 8px rgba(0,0,0,0.4); }
.btn-discard { background: linear-gradient(135deg, #3a1a00, #7a3d00); color: #ffd700; box-shadow: 0 3px 0 #1a0900, 0 4px 8px rgba(0,0,0,0.4); }
.btn-pass  { background: linear-gradient(135deg, #1a1a1a, #333); color: #999; box-shadow: 0 3px 0 #000, 0 4px 8px rgba(0,0,0,0.4); }
.btn-start { background: linear-gradient(135deg, #8b0000, #c0392b); color: var(--gold-light); font-size: 20px; padding: 14px 40px; box-shadow: 0 4px 0 #500000, 0 6px 20px rgba(192,57,43,0.4); }

/* ── PLAYER LABEL ─────────────────────────────────── */
.player-label {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--text-dim);
}

.dealer-badge {
  background: var(--gold);
  color: #000;
  font-size: 10px;
  font-weight: 900;
  padding: 1px 5px;
  border-radius: 3px;
}

.wind-badge {
  width: 20px; height: 20px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(212,168,67,0.4);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  color: var(--gold);
  font-weight: bold;
}

.thinking {
  display: flex;
  gap: 2px;
  align-items: center;
}
.thinking span {
  width: 4px; height: 4px;
  background: var(--gold);
  border-radius: 50%;
  display: inline-block;
  animation: dotBounce 1.2s infinite;
}
.thinking span:nth-child(2) { animation-delay: 0.2s; }
.thinking span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-4px); opacity: 1; }
}

/* ── SCORE BAR ─────────────────────────────────── */
.score-bar {
  display: flex;
  gap: 10px;
  background: var(--panel-bg);
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid rgba(212,168,67,0.2);
}

.score-entry { text-align: center; }
.score-name { font-size: 10px; color: var(--text-dim); }
.score-val  { font-size: 14px; font-weight: 900; color: var(--gold); }
.score-val.negative { color: #e74c3c; }

/* ── FLOWER DISPLAY ─────────────────────────────────── */
.flowers {
  display: flex;
  gap: 2px;
}

/* ── OVERLAY / MODALS ─────────────────────────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.82);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: linear-gradient(160deg, #0a2015, #051009);
  border: 1px solid rgba(212,168,67,0.5);
  border-radius: 18px;
  padding: 36px 44px;
  text-align: center;
  max-width: 420px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(212,168,67,0.15);
  animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes modalPop {
  from { transform: scale(0.8); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

.modal-title {
  font-size: 42px;
  color: var(--gold);
  font-family: 'Ma Shan Zheng', serif;
  margin-bottom: 6px;
}
.modal-sub { font-size: 14px; color: var(--text-dim); line-height: 1.8; }
.modal-score { font-size: 28px; color: #fff; margin: 14px 0 6px; font-weight: 900; }
.modal-detail { font-size: 12px; color: var(--text-dim); line-height: 2; }
.modal-win-type { font-size: 20px; color: var(--gold-light); margin: 8px 0; }

.modal-btn-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 24px;
}

/* ── NOTIFICATION TOAST ─────────────────────────────────── */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.9);
  border: 1px solid var(--gold);
  border-radius: 10px;
  padding: 14px 28px;
  font-size: 26px;
  font-weight: 900;
  color: var(--gold);
  font-family: 'Ma Shan Zheng', serif;
  z-index: 300;
  pointer-events: none;
  animation: toastIn 0.25s ease, toastOut 0.3s ease 1.6s forwards;
}
@keyframes toastIn  { from { opacity: 0; transform: translate(-50%,-60%) scale(0.8); } to { opacity: 1; transform: translate(-50%,-50%) scale(1); } }
@keyframes toastOut { to   { opacity: 0; transform: translate(-50%,-40%) scale(0.9); } }

/* ── WIN CELEBRATION ─────────────────────────────────── */
@keyframes celebrateShake {
  0%,100% { transform: rotate(0deg); }
  25% { transform: rotate(-3deg); }
  75% { transform: rotate(3deg); }
}

.celebrate { animation: celebrateShake 0.4s ease 2; }

/* ── SCROLLBAR ─────────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: rgba(212,168,67,0.3); border-radius: 2px; }

/* ── MUSIC TOGGLE ─────────────────────────────────── */
.music-btn {
  position: fixed;
  top: 12px;
  right: 14px;
  z-index: 100;
  width: 38px; height: 38px;
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(212,168,67,0.35);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
  backdrop-filter: blur(4px);
}
.music-btn:hover { background: rgba(0,0,0,0.75); border-color: var(--gold); }
.music-btn.muted { opacity: 0.45; }

/* ── RESPONSIVE ─────────────────────────────────── */
@media (max-width: 700px) {
  .table {
    grid-template-columns: 90px 1fr 90px;
    grid-template-rows: 100px 1fr 160px;
  }
  .tile { width: 30px; height: 42px; font-size: 9px; }
  .tile.side { width: 42px; height: 30px; }
  .wall-number { font-size: 32px; }
  .score-bar { gap: 6px; padding: 6px 10px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

/* ================================================================
   AUDIO ENGINE  (Web Audio API — fully synthesized, no files)
================================================================ */
const AudioEngine = (() => {
  let ctx = null;
  let masterGain = null;
  let bgmGain = null;
  let sfxGain = null;
  let bgmRunning = false;
  let bgmTimer = null;
  let _muted = false;

  function getCtx() {
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain(); masterGain.gain.value = 0.72; masterGain.connect(ctx.destination);
      bgmGain = ctx.createGain();    bgmGain.gain.value = 0.28;    bgmGain.connect(masterGain);
      sfxGain = ctx.createGain();    sfxGain.gain.value = 0.9;     sfxGain.connect(masterGain);
    }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function osc(freq, type, startT, dur, peakVol, dest) {
    const c = getCtx();
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0, startT);
    g.gain.linearRampToValueAtTime(peakVol, startT + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, startT + dur);
    o.connect(g); g.connect(dest || sfxGain);
    o.start(startT); o.stop(startT + dur + 0.01);
  }

  function noiseBlip(startT, dur, vol, freq, dest) {
    const c = getCtx();
    const buf = c.createBuffer(1, Math.ceil(c.sampleRate * dur), c.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = c.createBufferSource(); src.buffer = buf;
    const flt = c.createBiquadFilter(); flt.type = 'bandpass'; flt.frequency.value = freq || 2200; flt.Q.value = 0.8;
    const g = c.createGain();
    g.gain.setValueAtTime(vol, startT);
    g.gain.exponentialRampToValueAtTime(0.0001, startT + dur);
    src.connect(flt); flt.connect(g); g.connect(dest || sfxGain);
    src.start(startT); src.stop(startT + dur + 0.01);
  }

  /* ── SFX library ── */
  const SFX = {
    tileClick() {
      if (_muted) return; const c=getCtx(), t=c.currentTime;
      noiseBlip(t, 0.04, 0.18); osc(1100,'sine',t,0.06,0.12);
    },
    tileDiscard() {
      if (_muted) return; const c=getCtx(), t=c.currentTime;
      noiseBlip(t, 0.07, 0.38, 1800);
      osc(420,'sine',t,0.12,0.18); osc(280,'sine',t+0.01,0.10,0.10);
    },
    pong() {
      if (_muted) return; const c=getCtx(), t=c.currentTime;
      noiseBlip(t, 0.03, 0.15);
      osc(880,'sine',t,0.55,0.30); osc(1108,'sine',t+0.08,0.45,0.22);
    },
    chi() {
      if (_muted) return; const c=getCtx(), t=c.currentTime;
      osc(660,'sine',t,0.4,0.22); osc(880,'sine',t+0.10,0.4,0.20);
    },
    kong() {
      if (_muted) return; const c=getCtx(), t=c.currentTime;
      osc(220,'sine',t,1.4,0.40); osc(440,'triangle',t,0.9,0.18);
      osc(660,'sine',t,0.5,0.10); noiseBlip(t,0.08,0.20,800);
    },
    win() {
      if (_muted) return; const c=getCtx(), t=c.currentTime;
      [523.25,659.25,783.99,1046.5,1318.5,1568].forEach((f,i)=>{
        osc(f,'sine',t+i*0.11,0.6,0.30); osc(f/2,'triangle',t+i*0.11,0.6,0.10);
      });
      [523.25,659.25,783.99].forEach(f=>osc(f,'sine',t+6*0.11,1.2,0.22));
    },
    deal() {
      if (_muted) return; const c=getCtx(), t=c.currentTime;
      for(let i=0;i<8;i++){noiseBlip(t+i*0.06,0.05,0.18-i*0.015,1500); osc(800+i*60,'sine',t+i*0.06,0.04,0.07);}
    },
    draw() {
      if (_muted) return; const c=getCtx(), t=c.currentTime;
      noiseBlip(t,0.035,0.10,2400); osc(900,'sine',t,0.045,0.05);
    },
  };

  /* ── BGM: Chinese pentatonic melody ──
     D pentatonic major: D E G A B (octaves 4 & 5)
  */
  const SCALE=[293.66,329.63,392.00,440.00,493.88,587.33,659.25,784.00,880.00,987.77];
  const MELODY=[2,4,5,4,2,1,0,1,2,4,7,5,4,2,1,0];
  const BASS  =[0,0,2,0,0,0,2,4,0,0,2,0,4,2,0,0];
  const STEP=0.40;

  function bgmStep(i) {
    if (!bgmRunning || _muted) return;
    const c=getCtx(), t=c.currentTime;
    const mf=SCALE[MELODY[i%MELODY.length]];
    const bf=SCALE[BASS[i%BASS.length]]/2;
    osc(mf,'sine',t,STEP*0.72,0.11,bgmGain);
    if(i%4===0) osc(mf*1.498,'sine',t,STEP*0.5,0.04,bgmGain);
    if(i%2===0){ osc(bf,'triangle',t,STEP*1.5,0.09,bgmGain); osc(bf*2,'sine',t,STEP*0.55,0.04,bgmGain); }
    // hi-hat
    if(i%4===0){
      const c2=getCtx();
      const nb=c2.createBuffer(1,Math.ceil(c2.sampleRate*0.04),c2.sampleRate);
      const nd=nb.getChannelData(0); for(let k=0;k<nd.length;k++) nd[k]=Math.random()*2-1;
      const ns=c2.createBufferSource(); ns.buffer=nb;
      const nf=c2.createBiquadFilter(); nf.type='highpass'; nf.frequency.value=5000;
      const ng=c2.createGain(); ng.gain.setValueAtTime(0.055,t); ng.gain.exponentialRampToValueAtTime(0.001,t+0.04);
      ns.connect(nf); nf.connect(ng); ng.connect(bgmGain); ns.start(t); ns.stop(t+0.05);
    }
    bgmTimer=setTimeout(()=>bgmStep(i+1), STEP*1000);
  }

  return {
    startBgm() { if(bgmRunning) return; getCtx(); bgmRunning=true; bgmStep(0); },
    stopBgm()  { bgmRunning=false; clearTimeout(bgmTimer); },
    setMuted(m) {
      _muted=m;
      if(!ctx) return;
      if(m){ masterGain.gain.setTargetAtTime(0,ctx.currentTime,0.25); this.stopBgm(); }
      else  { masterGain.gain.setTargetAtTime(0.72,ctx.currentTime,0.25); this.startBgm(); }
    },
    isMuted(){ return _muted; },
    sfx: SFX,
  };
})();

/* ================================================================
   TILE SYSTEM
================================================================ */
const SUIT_ORDER = { man:0, pin:1, sou:2, wind:3, dragon:4, flower:5 };

const DISPLAY = {
  man:    v => '一二三四五六七八九'[v-1] + '萬',
  pin:    v => '一二三四五六七八九'[v-1] + '筒',
  sou:    v => '一二三四五六七八九'[v-1] + '索',
  wind:   v => ['東','南','西','北'][v-1],
  dragon: v => ['中','發','白'][v-1],
  flower: v => ['梅','蘭','菊','竹','春','夏','秋','冬'][v-1],
};

function tileClass(tile) {
  if (!tile) return '';
  switch(tile.suit) {
    case 'man': return 'suit-man';
    case 'pin': return 'suit-pin';
    case 'sou': return 'suit-sou';
    case 'wind': return 'suit-wind';
    case 'dragon':
      if (tile.value===1) return 'suit-dragon-red';
      if (tile.value===2) return 'suit-dragon-green';
      return 'suit-dragon-white';
    case 'flower': return 'suit-flower';
    default: return '';
  }
}

function tileSort(a, b) {
  const sa = SUIT_ORDER[a.suit]*10 + a.value;
  const sb = SUIT_ORDER[b.suit]*10 + b.value;
  return sa - sb;
}

function genTiles() {
  const tiles = [];
  let id = 0;
  ['man','pin','sou'].forEach(suit => {
    for (let v=1; v<=9; v++)
      for (let c=0; c<4; c++)
        tiles.push({id:id++, suit, value:v});
  });
  for (let v=1; v<=4; v++)
    for (let c=0; c<4; c++)
      tiles.push({id:id++, suit:'wind', value:v});
  for (let v=1; v<=3; v++)
    for (let c=0; c<4; c++)
      tiles.push({id:id++, suit:'dragon', value:v});
  for (let v=1; v<=8; v++)
    tiles.push({id:id++, suit:'flower', value:v});
  return tiles;
}

function shuffle(arr) {
  const a=[...arr];
  for (let i=a.length-1; i>0; i--) {
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* ================================================================
   WIN DETECTION
================================================================ */
function tileInt(t) {
  return SUIT_ORDER[t.suit]*9 + t.value - 1;
}

// Check if a set of tiles can form all melds (no pair needed)
function canMeld(tiles) {
  if (tiles.length === 0) return true;
  const sorted = [...tiles].sort(tileSort);
  const t0 = sorted[0];

  // Try triplet
  const same = [];
  for (const t of sorted) {
    if (t.suit===t0.suit && t.value===t0.value) same.push(t);
    if (same.length===3) break;
  }
  if (same.length>=3) {
    const rest = sorted.filter(t => !same.slice(0,3).includes(t));
    // actually need to remove by reference properly
    const used = new Set(same.slice(0,3).map(t=>t.id));
    const rest2 = sorted.filter(t=>!used.has(t.id));
    if (canMeld(rest2)) return true;
  }

  // Try sequence
  if (['man','pin','sou'].includes(t0.suit) && t0.value<=7) {
    const seq = [t0];
    const needs = [t0.value+1, t0.value+2];
    const usedIds = new Set([t0.id]);
    for (const n of needs) {
      const found = sorted.find(t=>!usedIds.has(t.id)&&t.suit===t0.suit&&t.value===n);
      if (!found) break;
      seq.push(found);
      usedIds.add(found.id);
    }
    if (seq.length===3) {
      const rest = sorted.filter(t=>!usedIds.has(t.id));
      if (canMeld(rest)) return true;
    }
  }

  return false;
}

function checkWin(hand) {
  if (!hand || hand.length < 13) return {win:false};

  const isFullHand = hand.length === 14;
  if (!isFullHand) return {win:false};

  // 7 pairs
  const cnt = {};
  for (const t of hand) {
    const k=`${t.suit}-${t.value}`;
    cnt[k]=(cnt[k]||0)+1;
  }
  const pairCount = Object.values(cnt).filter(c=>c>=2).length;
  const uniqueCount = Object.keys(cnt).length;
  if (uniqueCount===7 && pairCount===7) return {win:true, type:'七對', fan:4};

  // Normal: 4 melds + 1 pair
  const sorted = [...hand].sort(tileSort);
  const triedPair = new Set();

  for (let i=0; i<sorted.length; i++) {
    const pk=`${sorted[i].suit}-${sorted[i].value}`;
    if (triedPair.has(pk)) continue;
    triedPair.add(pk);

    // Find two of same kind
    const matches = sorted.filter(t=>t.suit===sorted[i].suit&&t.value===sorted[i].value);
    if (matches.length<2) continue;

    const pairIds=new Set([matches[0].id, matches[1].id]);
    const rest=sorted.filter(t=>!pairIds.has(t.id));

    if (canMeld(rest)) {
      // Determine fan
      let fan=1;
      let type='普通胡';
      // All same suit (clean)?
      const suits=new Set(rest.map(t=>t.suit));
      suits.add(sorted[i].suit);
      const numSuits=new Set([...suits].filter(s=>['man','pin','sou'].includes(s)));
      if (numSuits.size===1 && [...suits].every(s=>['man','pin','sou'].includes(s))) {
        fan=24; type='清一色';
      } else if ([...suits].every(s=>['wind','dragon'].includes(s))) {
        fan=32; type='字一色';
      } else if (hand.every(t=>t.value===1||t.value===9||t.suit==='wind'||t.suit==='dragon')) {
        fan=16; type='混老頭';
      }
      return {win:true, type, fan};
    }
  }

  return {win:false};
}

// Can win with this tile?
function canWinWith(hand13, tile) {
  return checkWin([...hand13, tile]).win;
}

/* ================================================================
   SHANTEN NUMBER (simplified)
================================================================ */
function shantenNum(hand) {
  if (hand.length===0) return 8;

  // 7-pair shanten
  const cnt={};
  for (const t of hand) {
    const k=`${t.suit}-${t.value}`;
    cnt[k]=(cnt[k]||0)+1;
  }
  const pairs=Object.values(cnt).filter(c=>c>=2).length;
  const s7 = 6-pairs;

  // Normal hand: try all pairs as head
  let bestNormal = 8;
  const triedP = new Set();

  const sorted = [...hand].sort(tileSort);

  for (const t of sorted) {
    const pk=`${t.suit}-${t.value}`;
    if (triedP.has(pk)) continue;
    if (cnt[pk]<2) continue;
    triedP.add(pk);

    const pairIds=[sorted.find(x=>x.suit===t.suit&&x.value===t.value).id];
    for (const x of sorted) {
      if (x.suit===t.suit&&x.value===t.value&&!pairIds.includes(x.id)) {
        pairIds.push(x.id); break;
      }
    }

    const rest=sorted.filter(x=>!pairIds.includes(x.id));
    const {complete, partial}=countMeldsPart(rest);
    const available=4-complete;
    const totalPartial=Math.min(partial, available);
    const s=8-2*complete-totalPartial-1;
    if (s<bestNormal) bestNormal=s;
  }

  return Math.min(s7, bestNormal);
}

function countMeldsPart(tiles) {
  if (tiles.length===0) return {complete:0, partial:0};
  const sorted=[...tiles].sort(tileSort);
  const used=new Array(sorted.length).fill(false);
  let complete=0;

  // Complete melds
  for (let i=0; i<sorted.length; i++) {
    if (used[i]) continue;
    const t=sorted[i];
    // Triplet
    const ti=[i];
    for (let j=i+1; j<sorted.length&&ti.length<3; j++) {
      if (!used[j]&&sorted[j].suit===t.suit&&sorted[j].value===t.value) ti.push(j);
    }
    if (ti.length===3) { ti.forEach(x=>used[x]=true); complete++; continue; }
    // Sequence
    if (['man','pin','sou'].includes(t.suit)&&t.value<=7) {
      const i2=sorted.findIndex((x,j)=>j>i&&!used[j]&&x.suit===t.suit&&x.value===t.value+1);
      if (i2!==-1) {
        const i3=sorted.findIndex((x,j)=>j>i&&!used[j]&&j!==i2&&x.suit===t.suit&&x.value===t.value+2);
        if (i3!==-1) { used[i]=used[i2]=used[i3]=true; complete++; continue; }
      }
    }
  }

  // Partial melds
  let partial=0;
  for (let i=0; i<sorted.length; i++) {
    if (used[i]) continue;
    const t=sorted[i];
    for (let j=i+1; j<sorted.length; j++) {
      if (used[j]) continue;
      const t2=sorted[j];
      const sameKind=t.suit===t2.suit;
      const isPair=sameKind&&t.value===t2.value;
      const isAdj=sameKind&&['man','pin','sou'].includes(t.suit)&&Math.abs(t.value-t2.value)<=2;
      if (isPair||isAdj) { used[i]=used[j]=true; partial++; break; }
    }
  }

  return {complete, partial};
}

/* ================================================================
   AI ENGINE
================================================================ */
function aiDiscard(hand, level) {
  if (level===1) return Math.floor(Math.random()*hand.length);

  let bestIdx=0, bestSh=99;
  const isolated=[];

  for (let i=0; i<hand.length; i++) {
    const rest=hand.filter((_,j)=>j!==i);
    const sh=shantenNum(rest);
    if (sh<bestSh) { bestSh=sh; bestIdx=i; }
    else if (sh===bestSh && isIsolated(hand[i], rest)) {
      isolated.push(i);
    }
  }

  // Among same shanten: prefer to discard isolated/honor tiles
  if (isolated.length>0 && shantenNum(hand.filter((_,j)=>j!==isolated[0]))===bestSh) {
    return isolated[0];
  }

  return bestIdx;
}

function isIsolated(tile, hand) {
  if (tile.suit==='flower') return true;
  if (tile.suit==='wind'||tile.suit==='dragon') {
    return hand.filter(t=>t.suit===tile.suit&&t.value===tile.value).length===0;
  }
  return !hand.some(t=>t.suit===tile.suit&&Math.abs(t.value-tile.value)<=2);
}

function aiShouldPong(hand, tile, level) {
  if (level===1) return Math.random()>0.6;
  const matching=hand.filter(t=>t.suit===tile.suit&&t.value===tile.value);
  if (matching.length<2) return false;
  const sh=shantenNum(hand);
  // Pong if it reduces shanten or we're in endgame
  const withPong=[...hand.filter(t=>!matching.slice(0,2).includes(t))];
  const shAfter=shantenNum(withPong)-1; // rough estimate
  return sh>=1&&(shAfter<sh||level>=3);
}

function aiShouldKong(hand, tile, level) {
  if (level<2) return false;
  const matching=hand.filter(t=>t.suit===tile.suit&&t.value===tile.value);
  return matching.length>=3&&level>=3;
}

/* ================================================================

================================================================ */
const PLAYER_NAMES=['你','AI 東','AI 南','AI 西'];
const WIND_CHARS=['東','南','西','北'];
const POSITIONS=['bottom','right','top','left'];

function createGame() {
  const wall=shuffle(genTiles());
  const players=Array.from({length:4},(_,i)=>({
    id:i, name:PLAYER_NAMES[i],
    isHuman:i===0,
    hand:[], exposed:[], discards:[], flowers:[],
    score:10000, wind:i,
    aiLevel: i===0?0:[1,2,3][i-1],
  }));

  // Deal 13 tiles to each
  let wi=0;
  const taken=[];

  function drawFromWall() {
    while (wi<wall.length) {
      const t=wall[wi++];
      return t;
    }
    return null;
  }

  // Deal round by round
  for (let r=0; r<13; r++) {
    for (let p=0; p<4; p++) {
      const t=drawFromWall();
      if (t) {
        if (t.suit==='flower') {
          players[p].flowers.push(t);
          const rep=drawFromWall();
          if (rep) players[p].hand.push(rep);
        } else {
          players[p].hand.push(t);
        }
      }
    }
  }

  // Sort hands
  players.forEach(p=>p.hand.sort(tileSort));

  const remaining=wall.slice(wi);

  return {
    players,
    wall: remaining,
    phase: 'human_draw',   // human draws first (dealer)
    currentPlayer: 0,
    lastDiscard: null,
    lastDiscardPlayer: -1,
    drawnTile: null,
    winResult: null,
    round: 1,
    dealer: 0,
    gameRound: 1,
    maxRounds: 8,
    message: null,
    turnId: 0,
  };
}

/* ================================================================
   GAME REDUCER
================================================================ */
function drawTileForPlayer(state, pid) {
  if (state.wall.length===0) return {...state, phase:'ryukyoku'};
  const t=state.wall[0];
  const newWall=state.wall.slice(1);

  if (t.suit==='flower') {
    // Replace flower
    const newPlayers=state.players.map((p,i)=>{
      if (i!==pid) return p;
      return {...p, flowers:[...p.flowers,t]};
    });
    return drawTileForPlayer({...state, players:newPlayers, wall:newWall}, pid);
  }

  const newPlayers=state.players.map((p,i)=>{
    if (i!==pid) return p;
    const newHand=[...p.hand, t].sort(tileSort);
    return {...p, hand:newHand};
  });

  return {...state, players:newPlayers, wall:newWall, drawnTile:t};
}

  let cls='tile';

  if (size==='side') cls+=' side';
  if (size==='meld') cls+=' meld';
  if (faceDown) cls+=' face-down';
  else cls+=` ${tileClass(tile)}`;
  if (selected) cls+=' selected';
  if (highlighted) cls+=' highlight-discard';
  if (isNew) cls+=' new-tile';
  if (noHover||faceDown) cls+=' no-hover';

  const display = faceDown ? null : (tile ? DISPLAY[tile.suit](tile.value) : '?');

  return (
    <div className={cls} onClick={onClick} title={display||''}>
      {!faceDown && display}
    </div>
  );
}

   MAIN GAME
================================================================ */
function MahjongGame() {
  const [screen, setScreen]=useState('start');
  const [game, setGame]=useState(null);
  const [selectedIdx, setSelectedIdx]=useState(null);
  const [toast, setToast]=useState(null);
  // claimOptions now lives inside game.claimOptions
  const [isAiThinking, setIsAiThinking]=useState(false);
  const [musicOn, setMusicOn]=useState(true);
  const aiTimer=useRef(null);
  const toastTimer=useRef(null);
  const discardRef=useRef(null);

  const toggleMusic=useCallback(()=>{
    const next=!musicOn;
    setMusicOn(next);
    AudioEngine.setMuted(!next);
  },[musicOn]);

  const showToast=useCallback((msg, dur=1900)=>{
    setToast(null);
    clearTimeout(toastTimer.current);
    requestAnimationFrame(()=>{
      setToast(msg);
      toastTimer.current=setTimeout(()=>setToast(null), dur);
    });
  },[]);

  // ── START ──────────────────────────────────────────
  const handleStart=useCallback(()=>{
    AudioEngine.startBgm();
    AudioEngine.sfx.deal();
    const g=createGame();
    setGame(g);
    setScreen('game');
    setSelectedIdx(null);
    showToast('遊戲開始！');
  },[showToast]);

  // ── DRAW FOR HUMAN ─────────────────────────────────
  useEffect(()=>{
    if (!game||game.phase!=='human_draw') return;
    if (game.wall.length===0) {
      setGame(g=>({...g, phase:'ryukyoku'}));
      return;
    }
    const newG=drawTileForPlayer(game, 0);
    AudioEngine.sfx.draw();
    setGame({...newG, phase:'human_discard'});
    setSelectedIdx(null);
  // eslint-disable-next-line
  }, [game?.phase, game?.round]);

  // ── HUMAN DISCARD ──────────────────────────────────
  const handleSelectTile=useCallback((idx)=>{
    if (!game||game.phase!=='human_discard') return;
    if (selectedIdx===idx) {
      // Second click on same tile → discard immediately (call OUTSIDE updater)
      discardRef.current && discardRef.current(idx);
    } else {
      AudioEngine.sfx.tileClick();
      setSelectedIdx(idx);
    }
  },[game, selectedIdx]);

  const handleDiscard=useCallback((forceIdx)=>{
    const useIdx = forceIdx !== undefined ? forceIdx : selectedIdx;
    if (useIdx===null||useIdx===undefined||!game||game.phase!=='human_discard') return;

    AudioEngine.sfx.tileDiscard();
    const tile=game.players[0].hand[useIdx];
    const newPlayers=game.players.map((p,i)=>{
      if (i!==0) return p;
      return {
        ...p,
        hand:p.hand.filter((_,j)=>j!==useIdx),
        discards:[...p.discards,tile],
      };
    });

    let newG={...game, players:newPlayers, lastDiscard:tile, lastDiscardPlayer:0, drawnTile:null};

    // Check AI claims after human discard
    const claims=checkAiClaims(newG, tile, 0);
    if (claims.winner!=null) {
      newG=applyWin(newG, claims.winner, false, 0, tile);
    } else if (claims.claimant!=null) {
      newG=applyAiClaim(newG, claims.claimant, claims.claimType, tile);
    } else {
      newG={...newG, currentPlayer:1, phase:'ai_turn', claimOptions:[]};
    }

    setGame(newG);
    setSelectedIdx(null);
  },[game, selectedIdx]);
  discardRef.current=handleDiscard;

  // ── AI WIN CHECK ───────────────────────────────────
  function checkAiClaims(g, discardTile, fromPlayer) {
    // Check all other players for hu, pong, kong (priority: hu > kong > pong)
    let winner=null, claimant=null, claimType=null;

    // Priority check: first pass for hu
    for (let p=1; p<=3; p++) {
      const pid=(fromPlayer+p)%4;
      if (pid===fromPlayer) continue;
      const player=g.players[pid];
      if (canWinWith(player.hand, discardTile)) {
        winner=pid;
        return {winner, claimant:null, claimType:null};
      }
    }

    // Second pass: pong/kong by AI
    for (let p=1; p<=3; p++) {
      const pid=(fromPlayer+p)%4;
      if (pid===fromPlayer||pid===0) continue; // Human handled separately
      const player=g.players[pid];
      if (aiShouldKong(player.hand, discardTile, player.aiLevel)) {
        return {winner:null, claimant:pid, claimType:'kong'};
      }
      if (aiShouldPong(player.hand, discardTile, player.aiLevel)) {
        return {winner:null, claimant:pid, claimType:'pong'};
      }
    }

    return {winner:null, claimant:null, claimType:null};
  }

  function applyWin(g, winnerId, isSelfDraw, fromPlayer, tile) {
    const winner=g.players[winnerId];
    const hand=isSelfDraw ? winner.hand : [...winner.hand, tile];
    const result=checkWin(hand);
    const fan=result.fan||1;
    const base=fan*100;
    let delta=0;
    const newPlayers=[...g.players];

    if (isSelfDraw) {
      delta=base*3;
      newPlayers.forEach((_,i)=>{
        if (i===winnerId) newPlayers[i]={...newPlayers[i], score:newPlayers[i].score+base*3};
        else newPlayers[i]={...newPlayers[i], score:newPlayers[i].score-base};
      });
    } else {
      delta=base*3;
      newPlayers[winnerId]={...newPlayers[winnerId], score:newPlayers[winnerId].score+base*3};
      newPlayers[fromPlayer]={...newPlayers[fromPlayer], score:newPlayers[fromPlayer].score-base*3};
    }

    return {
      ...g,
      players:newPlayers,
      phase:'settlement',
      winResult:{winner:winnerId, type:result.type||'普通胡', fan, delta, isSelfDraw},
    };
  }

  function applyAiClaim(g, pid, type, tile) {
    if(type==='pong') AudioEngine.sfx.pong();
    if(type==='kong') AudioEngine.sfx.kong();
    const player=g.players[pid];
    let newHand=[...player.hand];
    let newExposed=[...player.exposed];

    if (type==='pong') {
      const remove=[];
      for (let i=newHand.length-1; i>=0&&remove.length<2; i--) {
        if (newHand[i].suit===tile.suit&&newHand[i].value===tile.value) remove.push(i);
      }
      remove.sort((a,b)=>b-a).forEach(i=>newHand.splice(i,1));
      newExposed=[...newExposed,{type:'pong',tiles:[newHand[0]||tile,newHand[0]||tile,tile]}];
      // Actually pick correct tiles
      const pongTiles=[];
      const tempHand=[...player.hand];
      for (let i=tempHand.length-1; i>=0&&pongTiles.length<2; i--) {
        if (tempHand[i].suit===tile.suit&&tempHand[i].value===tile.value) {
          pongTiles.push(tempHand.splice(i,1)[0]);
        }
      }
      newHand=tempHand;
      newExposed=[...player.exposed,{type:'pong',tiles:[...pongTiles,tile]}];
    }

    // AI needs to discard after pong
    const discardIdx=aiDiscard(newHand, player.aiLevel);
    const discardTile=newHand[discardIdx];
    newHand=newHand.filter((_,i)=>i!==discardIdx);

    const newPlayers=g.players.map((p,i)=>{
      if (i!==pid) return p;
      return {...p, hand:newHand, exposed:newExposed, discards:[...p.discards,discardTile]};
    });

    // Check if human can hu after this
    const human=newPlayers[0];
    if (canWinWith(human.hand, discardTile)) {
      const opts=[
        {type:'hu', label:'胡！'},
        {type:'pass', label:'過'},
      ];
      return {...g, players:newPlayers, lastDiscard:discardTile, lastDiscardPlayer:pid, phase:'human_claim', claimOptions:opts};
    }

    // Move to next player after the claimer
    const next=(pid+1)%4;
    return {
      ...g, players:newPlayers,
      lastDiscard:discardTile, lastDiscardPlayer:pid,
      currentPlayer:next,
      phase:next===0?'human_draw':'ai_turn',
      drawnTile:null,
    };
  }

  // ── CHECK HUMAN CLAIM OPTIONS ───────────────────────
  function computeHumanClaims(g, tile, fromPlayer) {
    const human=g.players[0];
    const opts=[];

    if (canWinWith(human.hand, tile)) opts.push({type:'hu',label:'胡！'});

    const matching=human.hand.filter(t=>t.suit===tile.suit&&t.value===tile.value);
    if (matching.length>=2) opts.push({type:'pong',label:'碰'});
    if (matching.length>=3) opts.push({type:'kong',label:'槓'});

    // Chi: only from player to human's right (fromPlayer === 3)
    if (fromPlayer===3&&['man','pin','sou'].includes(tile.suit)) {
      const canChi=checkCanChi(human.hand, tile);
      if (canChi) opts.push({type:'chi',label:'吃'});
    }

    if (opts.length>0) opts.push({type:'pass',label:'過'});
    return opts;
  }

  function checkCanChi(hand, tile) {
    const s=tile.suit, v=tile.value;
    if (!['man','pin','sou'].includes(s)) return false;
    const hasV=(n)=>hand.some(t=>t.suit===s&&t.value===n);
    return (hasV(v-2)&&hasV(v-1))||(hasV(v-1)&&hasV(v+1))||(hasV(v+1)&&hasV(v+2));
  }

  // ── AI TURN ─────────────────────────────────────────
  useEffect(()=>{
    if (!game||game.phase!=='ai_turn') return;
    const pid=game.currentPlayer;
    setIsAiThinking(true);
    const delay=80+Math.random()*100;

    aiTimer.current=setTimeout(()=>{
      setIsAiThinking(false);
      setGame(g=>{
        if (!g||g.phase!=='ai_turn') return g;
        let newG=drawTileForPlayer(g, pid);
        if (newG.phase==='ryukyoku') return newG;

        const ai=newG.players[pid];
        const drawn=newG.drawnTile;

        // Check self-draw win
        if (drawn&&checkWin(ai.hand).win) {
          newG=applyWin(newG, pid, true, pid, null);
          return newG;
        }

        // Discard
        AudioEngine.sfx.tileDiscard();
        const discardIdx=aiDiscard(ai.hand, ai.aiLevel);
        const discardTile=ai.hand[discardIdx];
        const newHand=ai.hand.filter((_,i)=>i!==discardIdx);
        const newPlayers=newG.players.map((p,i)=>{
          if (i!==pid) return p;
          return {...p, hand:newHand, discards:[...p.discards,discardTile]};
        });
        newG={...newG, players:newPlayers, lastDiscard:discardTile, lastDiscardPlayer:pid, drawnTile:null};

        // Check if human can claim
        const humanOpts=computeHumanClaims(newG, discardTile, pid);
        if (humanOpts.length>0) {
          return {...newG, phase:'human_claim', claimOptions:humanOpts};
        }

        // Check other AI claims
        const claims=checkAiClaims(newG, discardTile, pid);
        if (claims.winner!=null) {
          return applyWin(newG, claims.winner, false, pid, discardTile);
        } else if (claims.claimant!=null) {
          return applyAiClaim(newG, claims.claimant, claims.claimType, discardTile);
        }

        // Next player
        const next=(pid+1)%4;
        return {...newG, currentPlayer:next, phase:next===0?'human_draw':'ai_turn', turnId:(newG.turnId||0)+1};
      });
    }, delay);

    return ()=>clearTimeout(aiTimer.current);
  // eslint-disable-next-line
  }, [game?.phase, game?.currentPlayer, game?.turnId]);

  // ── WATCHDOG: unstick AI if frozen >2s ────────────────
  useEffect(()=>{
    if (!game||game.phase!=='ai_turn') return;
    const watchdog=setTimeout(()=>{
      setGame(g=>{
        if (!g||g.phase!=='ai_turn') return g;
        // Force-advance to next player
        const next=(g.currentPlayer+1)%4;
        console.warn('[watchdog] unstuck from player', g.currentPlayer);
        return {...g, currentPlayer:next, phase:next===0?'human_draw':'ai_turn',
          turnId:(g.turnId||0)+1};
      });
    }, 2500);
    return ()=>clearTimeout(watchdog);
  }, [game?.phase, game?.currentPlayer, game?.turnId]);

  // ── HUMAN CLAIM HANDLER ─────────────────────────────
  const handleClaim=useCallback((type)=>{
    if (!game) return;
    const tile=game.lastDiscard;
    const fromPid=game.lastDiscardPlayer;
    setGame(g=>({...g, claimOptions:[]}));

    if (type==='hu') {
      AudioEngine.sfx.win();
      setGame(g=>applyWin(g, 0, false, fromPid, tile));
      return;
    }

    if (type==='pong') {
      AudioEngine.sfx.pong();
      setGame(g=>{
        const human=g.players[0];
        const pongTiles=[];
        const newHand=[...human.hand];
        for (let i=newHand.length-1; i>=0&&pongTiles.length<2; i--) {
          if (newHand[i].suit===tile.suit&&newHand[i].value===tile.value) {
            pongTiles.push(newHand.splice(i,1)[0]);
          }
        }
        const meld={type:'pong',tiles:[...pongTiles,tile]};
        const newPlayers=g.players.map((p,i)=>{
          if (i!==0) return p;
          return {...p, hand:newHand, exposed:[...p.exposed,meld]};
        });
        showToast('碰！');
        return {...g, players:newPlayers, phase:'human_discard', currentPlayer:0};
      });
      setSelectedIdx(null);
      return;
    }

    if (type==='chi') {
      AudioEngine.sfx.chi();
      // Find best chi combination - for simplicity, auto-pick first valid
      setGame(g=>{
        const human=g.players[0];
        const s=tile.suit, v=tile.value;
        const newHand=[...human.hand];
        let chiTiles=[tile];

        // Try v-2,v-1 + tile
        const findAndRemove=(val)=>{
          const idx=newHand.findIndex(t=>t.suit===s&&t.value===val);
          if (idx!==-1) { const t=newHand.splice(idx,1)[0]; return t; }
          return null;
        };

        let t1=null,t2=null;
        if (v>=3) { t1=findAndRemove(v-2); t2=t1?findAndRemove(v-1):null; }
        if (!t1||!t2) {
          // Try v-1,v+1
          t1=findAndRemove(v-1); t2=t1?findAndRemove(v+1):null;
        }
        if (!t1||!t2) {
          // Try v+1,v+2
          t1=findAndRemove(v+1); t2=t1?findAndRemove(v+2):null;
        }

        if (!t1||!t2) return {...g, phase:'human_discard', currentPlayer:0};

        const meld={type:'chi',tiles:[t1,t2,tile].sort(tileSort)};
        const newPlayers=g.players.map((p,i)=>{
          if (i!==0) return p;
          return {...p, hand:newHand, exposed:[...p.exposed,meld]};
        });
        showToast('吃！');
        return {...g, players:newPlayers, phase:'human_discard', currentPlayer:0};
      });
      setSelectedIdx(null);
      return;
    }

    // Pass
    const next=(fromPid+1)%4;
    setGame(g=>({
      ...g,
      currentPlayer: next===0?0:next,
      phase: next===0?'human_draw':'ai_turn',
    }));
  },[game, showToast]);

  // ── HU CHECK (human self-draw) ──────────────────────
  const handleHuCheck=useCallback(()=>{
    if (!game||game.phase!=='human_discard') return;
    const human=game.players[0];
    if (!checkWin(human.hand).win) { showToast('還未胡牌！'); return; }
    AudioEngine.sfx.win();
    setGame(g=>applyWin(g, 0, true, 0, null));
  },[game, showToast]);

  // ── NEXT ROUND / QUIT ──────────────────────────────
  const handleNext=useCallback(()=>{
    const g=createGame();
    g.players.forEach((p,i)=>{
      if (game) p.score=game.players[i].score;
    });
    setGame({...g, claimOptions:[]});
    setSelectedIdx(null);
    setScreen('game');
    AudioEngine.sfx.deal();
    showToast('新一局！');
  },[game, showToast]);

  // Report result to server when settlement reached
  useEffect(()=>{
    if (!game||game.phase!=='settlement'||!game.winResult) return;
    const wr=game.winResult;
    const isHumanWin=wr.winner===0;
    // determine if human lost (someone else won)
    const result = isHumanWin ? 'win' : 'loss';
    const chipDelta = isHumanWin ? wr.delta : -Math.floor(wr.delta/3);
    reportResult(result, chipDelta, wr.type, wr.fan, game.gameRound);
  // eslint-disable-next-line
  },[game?.phase]);

  const handleQuit=useCallback(()=>{
    setScreen('start');
    setGame(null);
  },[]);

  /* ── RENDER ───────────────────────────────────────── */
  if (screen==='start') return <StartScreen onStart={handleStart}/>;

  if (!game) return null;

  const {players, wall, phase, lastDiscard, lastDiscardPlayer, drawnTile, winResult} = game;
  const human=players[0];
  const isHumanTurn=phase==='human_discard';
  const aiThinkingPid=phase==='ai_turn'?game.currentPlayer:null;

  /* Wall display tiles (visual) */
  const wallBars=Math.min(Math.floor(wall.length/4),18);

  return (
    <div className="table">

      {/* ── TOP (player 2) ─── */}
      <div className="player-area top">
        <div className="player-label" style={{flexDirection:'column', alignItems:'center', gap:3}}>
          <div style={{display:'flex',gap:4,alignItems:'center'}}>
            <span className="wind-badge">{WIND_CHARS[players[2].wind]}</span>
            <span>{players[2].name}</span>
            {game.dealer===2&&<span className="dealer-badge">莊</span>}
            {aiThinkingPid===2&&<div className="thinking"><span/><span/><span/></div>}
          </div>
        </div>
        <ExposedMelds melds={players[2].exposed}/>
        <DiscardPile discards={players[2].discards}
          lastId={lastDiscardPlayer===2?lastDiscard?.id:null}
        />
        <Hand player={players[2]} isHuman={false}/>
      </div>

      {/* ── LEFT (player 3) ─── */}
      <div className="player-area left">
        <div style={{writingMode:'vertical-rl', display:'flex', flexDirection:'column', alignItems:'center', gap:4}}>
          <div style={{display:'flex',gap:3,alignItems:'center',writingMode:'horizontal-tb'}}>
            <span className="wind-badge">{WIND_CHARS[players[3].wind]}</span>
            {game.dealer===3&&<span className="dealer-badge">莊</span>}
            {aiThinkingPid===3&&<div className="thinking"><span/><span/><span/></div>}
          </div>
          <span style={{color:'var(--text-dim)',fontSize:11,writingMode:'vertical-rl'}}>{players[3].name}</span>
        </div>
        <ExposedMelds melds={players[3].exposed} vertical/>
        <DiscardPile discards={players[3].discards} vertical
          lastId={lastDiscardPlayer===3?lastDiscard?.id:null}
        />
        <Hand player={players[3]} isHuman={false} vertical/>
      </div>

      {/* ── CENTER ─── */}
      <div className="center">
        <div className="wall-panel">
          <div className="wall-number">{wall.length}</div>
          <div className="wall-label">剩餘牌張</div>
          <div className="round-info">
            第 {game.gameRound}/{game.maxRounds} 局 · 莊家 {players[game.dealer].name}
          </div>
        </div>

        <ScoreBar players={players}/>

        {/* Last discard highlight */}
        {lastDiscard && phase!=='human_claim' && (
          <div className="center-discard">
            <div className="center-discard-label">{players[lastDiscardPlayer]?.name} 打出</div>
            <Tile tile={lastDiscard} highlighted/>
          </div>
        )}

        {/* Human claim buttons */}
        {phase==='human_claim' && (game.claimOptions||[]).length>0 && (
          <div style={{textAlign:'center'}}>
            <div className="center-discard-label" style={{marginBottom:6}}>
              {players[lastDiscardPlayer]?.name} 打出
            </div>
            <Tile tile={lastDiscard} highlighted/>
            <div className="action-bar" style={{marginTop:10}}>
              {(game.claimOptions||[]).map(opt=>(
                <button key={opt.type}
                  className={`btn btn-${opt.type==='hu'?'hu':opt.type==='pong'?'pong':opt.type==='chi'?'chi':opt.type==='kong'?'kong':'pass'}`}
                  onClick={()=>handleClaim(opt.type)}
                >{opt.label}</button>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* ── RIGHT (player 1) ─── */}
      <div className="player-area right">
        <Hand player={players[1]} isHuman={false} vertical/>
        <DiscardPile discards={players[1].discards} vertical
          lastId={lastDiscardPlayer===1?lastDiscard?.id:null}
        />
        <ExposedMelds melds={players[1].exposed} vertical/>
        <div style={{writingMode:'vertical-rl', display:'flex', flexDirection:'column', alignItems:'center', gap:4}}>
          <span style={{color:'var(--text-dim)',fontSize:11,writingMode:'vertical-rl'}}>{players[1].name}</span>
          <div style={{display:'flex',gap:3,alignItems:'center',writingMode:'horizontal-tb'}}>
            <span className="wind-badge">{WIND_CHARS[players[1].wind]}</span>
            {game.dealer===1&&<span className="dealer-badge">莊</span>}
            {aiThinkingPid===1&&<div className="thinking"><span/><span/><span/></div>}
          </div>
        </div>
      </div>

      {/* ── BOTTOM (human) ─── */}
      <div className="player-area bottom">
        {/* Exposed melds */}
        <ExposedMelds melds={human.exposed}/>

        {/* Discard pile */}
        <DiscardPile discards={human.discards}
          lastId={lastDiscardPlayer===0?lastDiscard?.id:null}
        />

        {/* Hand */}
        <Hand
          player={human}
          isHuman={true}
          selectedIdx={selectedIdx}
          onSelect={handleSelectTile}
          drawnTile={drawnTile}
        />

        {/* Action buttons */}
        <div className="action-bar">
          {isHumanTurn && <>
            <button
              className="btn btn-discard"
              onClick={handleDiscard}
              disabled={selectedIdx===null}
            >
              {selectedIdx!==null?'打出':'選牌'}
            </button>
            <button className="btn btn-hu" onClick={handleHuCheck}>
              自摸胡
            </button>
          </>}
          {phase==='human_draw'&&(
            <button className="btn btn-pass" disabled>摸牌中…</button>
          )}
          {phase==='ai_turn'&&(
            <button className="btn btn-pass" disabled>等待對手…</button>
          )}
          {phase==='human_claim'&&(
            <button className="btn btn-pass" disabled>選擇動作…</button>
          )}
        </div>

        {/* Player info */}
        <div className="player-label" style={{justifyContent:'center', gap:8}}>
          <span className="wind-badge">{WIND_CHARS[human.wind]}</span>
          <span style={{color:'var(--gold)',fontWeight:'bold'}}>{human.name}</span>
          {game.dealer===0&&<span className="dealer-badge">莊</span>}
          {human.flowers.length>0&&(
            <span style={{color:'#b45309',fontSize:11}}>
              🌸×{human.flowers.length}
            </span>
          )}
          <span style={{color:'var(--text-dim)',fontSize:11}}>
            牌數：{human.hand.length}
          </span>
        </div>
      </div>

      {/* ── MODALS ─── */}
      {phase==='settlement'&&winResult&&(
        <WinModal result={winResult} players={players} onNext={handleNext} onQuit={handleQuit}/>
      )}
      {phase==='ryukyoku'&&(
        <RyukyokuModal players={players} onNext={handleNext} onQuit={handleQuit}/>
      )}

      {/* Toast */}
      {toast&&<Toast text={toast}/>}

      {/* Music toggle */}
      <button
        className={`music-btn${musicOn?'':' muted'}`}
        onClick={toggleMusic}
        title={musicOn?'關閉音樂':'開啟音樂'}
      >
        {musicOn ? '🎵' : '🔇'}
      </button>
    </div>
  );
}

/* ── MOUNT ── */
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<MahjongGame/>);
</script>
</body>
</html>
