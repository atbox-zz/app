<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🀄 中國麻將</title>
<style>
  :root {
    --green: #1B4D2E;
    --green-light: #236037;
    --green-dark: #103020;
    --ivory: #FFFBE6;
    --ivory-dark: #F0E8C8;
    --gold: #D4AF37;
    --red: #CC2200;
    --blue: #1A4A8A;
    --text: #2a1a08;
    --shadow: rgba(0,0,0,0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: radial-gradient(ellipse at center, #2a5a3a 0%, var(--green-dark) 100%);
    font-family: '黑體', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    color: var(--ivory);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Start Screen ──────────────────────── */
  #start-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; gap: 24px;
    background: radial-gradient(ellipse at center, #2a5a3a 0%, #0d2015 100%);
  }
  #start-screen h1 {
    font-size: 3.5rem; color: var(--gold);
    text-shadow: 0 0 20px rgba(212,175,55,0.5), 2px 2px 4px #000;
    letter-spacing: 0.1em;
  }
  #start-screen .subtitle { font-size: 1.1rem; color: var(--ivory-dark); opacity: 0.8; }
  .start-card {
    background: rgba(0,0,0,0.4); border: 1px solid rgba(212,175,55,0.3);
    border-radius: 16px; padding: 32px 40px; width: 360px;
    backdrop-filter: blur(8px);
  }
  .start-card h2 { color: var(--gold); margin-bottom: 20px; font-size: 1.2rem; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: var(--ivory-dark); }
  .form-group select, .form-group input {
    width: 100%; padding: 10px 14px;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px; color: var(--ivory); font-size: 1rem;
    appearance: none; cursor: pointer;
  }
  .btn-start {
    width: 100%; padding: 14px; font-size: 1.2rem; font-weight: bold;
    background: linear-gradient(135deg, var(--gold), #b8960c);
    color: #1a0800; border: none; border-radius: 10px;
    cursor: pointer; margin-top: 8px; letter-spacing: 0.1em;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 4px 15px rgba(212,175,55,0.4);
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212,175,55,0.5); }
  .btn-start:active { transform: translateY(0); }

  /* ── Game Screen ───────────────────────── */
  #game-screen { display: none; padding: 8px; }

  /* ── Header bar ────────────────────────── */
  .header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 16px; background: rgba(0,0,0,0.4);
    border-radius: 10px; margin-bottom: 8px; font-size: 0.85rem;
  }
  .header .round-info { color: var(--gold); font-weight: bold; }
  .header .scores { display: flex; gap: 16px; }
  .score-chip {
    padding: 3px 12px; border-radius: 20px;
    background: rgba(255,255,255,0.1); font-size: 0.8rem;
  }
  .score-chip.human { background: rgba(212,175,55,0.25); color: var(--gold); }

  /* ── Table layout ──────────────────────── */
  .table-layout {
    display: grid;
    grid-template-columns: 120px 1fr 120px;
    grid-template-rows: auto auto auto;
    gap: 6px;
    max-width: 900px;
    margin: 0 auto;
  }

  /* ── Player areas ──────────────────────── */
  .player-area {
    background: rgba(0,0,0,0.25); border-radius: 10px;
    padding: 8px; border: 1px solid rgba(255,255,255,0.08);
    position: relative;
  }
  .player-area.active { border-color: rgba(212,175,55,0.5); }
  .player-area.winner { border-color: #ff4; box-shadow: 0 0 15px rgba(255,255,0,0.3); }

  .player-label {
    font-size: 0.75rem; color: var(--ivory-dark); margin-bottom: 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .wind-badge {
    padding: 1px 6px; border-radius: 4px; font-size: 0.7rem;
    background: rgba(212,175,55,0.2); color: var(--gold);
  }
  .dealer-star { color: var(--gold); }

  /* North (top) */
  .north-area {
    grid-column: 1 / -1; grid-row: 1;
  }

  /* Middle row */
  .west-area  { grid-column: 1; grid-row: 2; }
  .center-area { grid-column: 2; grid-row: 2; }
  .east-area  { grid-column: 3; grid-row: 2; }

  /* South / human (bottom) */
  .south-area { grid-column: 1 / -1; grid-row: 3; }

  /* ── Tile rendering ────────────────────── */
  .tiles-row { display: flex; flex-wrap: wrap; gap: 3px; }
  .tile-back {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 36px; border-radius: 4px;
    background: linear-gradient(135deg, #3a5a8a, #1a3060);
    border: 1px solid rgba(255,255,255,0.2); font-size: 0.9rem;
    color: rgba(255,255,255,0.3); user-select: none;
  }
  .tile {
    display: inline-flex; flex-direction: column; align-items: center;
    justify-content: center; width: 40px; height: 52px;
    border-radius: 5px; font-size: 1.2rem; cursor: pointer;
    background: linear-gradient(160deg, #fffff8, var(--ivory-dark));
    border: 1px solid #c8b88a;
    box-shadow: 1px 2px 4px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.8);
    color: var(--text); transition: transform 0.15s, box-shadow 0.15s;
    user-select: none; position: relative;
  }
  .tile:hover { transform: translateY(-4px); box-shadow: 1px 6px 8px rgba(0,0,0,0.4); }
  .tile.selected {
    transform: translateY(-8px);
    box-shadow: 0 8px 16px rgba(212,175,55,0.6);
    border-color: var(--gold);
  }
  .tile .suit-label {
    font-size: 0.5rem; color: #888; line-height: 1;
    position: absolute; bottom: 2px;
  }
  .tile.wan .suit-label { color: #8a3a00; }
  .tile.tong .suit-label { color: #1a3a8a; }
  .tile.suo .suit-label { color: #1a6a2a; }
  .tile.feng, .tile.jian { font-size: 1rem; }
  .tile.jian-1 { color: var(--red); }
  .tile.jian-2 { color: #007700; }
  .tile.jian-3 { color: #555; }
  .tile.flower { color: #c94a9a; font-size: 0.9rem; }
  .tile.drawn { border-color: #7fc; }

  /* Smaller tiles for AI hands */
  .tile-sm {
    width: 28px; height: 36px; font-size: 0.85rem; border-radius: 4px;
    display: inline-flex; align-items: center; justify-content: center;
    background: linear-gradient(160deg, #fffff8, var(--ivory-dark));
    border: 1px solid #c8b88a; color: var(--text);
    box-shadow: 1px 1px 2px rgba(0,0,0,0.25); user-select: none;
  }

  /* ── Center area ────────────────────────── */
  .center-area {
    display: flex; flex-direction: column; align-items: center;
    justify-content: space-between; gap: 6px; min-height: 160px;
  }
  .wall-display {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px;
  }
  .wall-pile {
    display: flex; gap: 2px; flex-wrap: wrap; justify-content: center;
    max-width: 180px;
  }
  .wall-block {
    width: 8px; height: 12px; border-radius: 2px;
    background: linear-gradient(135deg, #4a7aaa, #2a5080);
    border: 1px solid rgba(255,255,255,0.15);
  }
  .wall-count { font-size: 1.5rem; font-weight: bold; color: var(--gold); }
  .wall-label { font-size: 0.7rem; color: var(--ivory-dark); opacity: 0.7; }

  /* Discard pools */
  .discard-pool {
    display: flex; flex-wrap: wrap; gap: 2px;
    min-height: 20px; margin-top: 4px;
  }
  .discard-tile {
    width: 22px; height: 28px; border-radius: 3px; font-size: 0.7rem;
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(255,255,252,0.85); color: var(--text);
    border: 1px solid rgba(200,184,138,0.5);
  }
  .discard-tile.last { border-color: var(--gold); box-shadow: 0 0 4px rgba(212,175,55,0.5); }

  /* Exposed melds */
  .exposed-melds { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .meld-group {
    display: flex; gap: 1px; padding: 2px;
    background: rgba(0,0,0,0.15); border-radius: 4px;
  }

  /* ── Action bar ─────────────────────────── */
  .action-bar {
    display: flex; gap: 8px; align-items: center;
    padding: 8px 12px; background: rgba(0,0,0,0.4);
    border-radius: 10px; margin-top: 6px; flex-wrap: wrap;
  }
  .action-label { font-size: 0.8rem; color: var(--ivory-dark); opacity: 0.7; }
  .btn-action {
    padding: 8px 18px; border: none; border-radius: 8px;
    font-size: 0.95rem; font-weight: bold; cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
    letter-spacing: 0.05em;
  }
  .btn-action:hover { transform: translateY(-2px); }
  .btn-action:active { transform: translateY(0); opacity: 0.8; }
  .btn-discard  { background: linear-gradient(135deg, #cc6600, #994400); color: #fff; }
  .btn-chi      { background: linear-gradient(135deg, #2244cc, #112288); color: #fff; }
  .btn-peng     { background: linear-gradient(135deg, #cc4400, #882200); color: #fff; }
  .btn-gang     { background: linear-gradient(135deg, #666, #333); color: #fff; }
  .btn-angang   { background: linear-gradient(135deg, #333, #111); color: #fff; }
  .btn-win      { background: linear-gradient(135deg, #c8a000, #8a6a00); color: #fff;
                  box-shadow: 0 0 12px rgba(200,160,0,0.4); }
  .btn-selfwin  { background: linear-gradient(135deg, var(--gold), #8a6a00); color: #1a0800;
                  box-shadow: 0 0 16px rgba(212,175,55,0.5); }
  .btn-pass     { background: rgba(255,255,255,0.1); color: var(--ivory-dark); }
  .btn-next     { background: linear-gradient(135deg, #1a6a2a, #0a4018); color: #fff;
                  padding: 10px 24px; font-size: 1rem; }

  /* ── Message area ───────────────────────── */
  .message-box {
    text-align: center; padding: 8px; font-size: 0.9rem;
    color: var(--ivory); background: rgba(0,0,0,0.3); border-radius: 8px;
    margin-top: 6px; min-height: 36px; line-height: 1.4;
    transition: all 0.3s;
  }
  .message-box.win { color: var(--gold); font-weight: bold; font-size: 1.1rem; }
  .message-box.exhaustive { color: #aac8ff; }

  /* ── Settlement overlay ─────────────────── */
  .settlement-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 100;
    align-items: center; justify-content: center;
  }
  .settlement-overlay.show { display: flex; }
  .settlement-card {
    background: linear-gradient(160deg, #1a3a20, #0d2015);
    border: 2px solid var(--gold); border-radius: 16px;
    padding: 32px 40px; min-width: 360px; max-width: 500px;
    box-shadow: 0 0 40px rgba(212,175,55,0.3);
  }
  .settlement-card h2 { color: var(--gold); margin-bottom: 20px; font-size: 1.4rem; text-align: center; }
  .fan-list { margin-bottom: 16px; }
  .fan-item {
    display: flex; justify-content: space-between;
    padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
    font-size: 0.9rem;
  }
  .fan-item .fan-count { color: var(--gold); font-weight: bold; }
  .fan-total {
    display: flex; justify-content: space-between;
    padding: 8px 0; font-weight: bold; font-size: 1.1rem;
    border-top: 1px solid var(--gold); margin-top: 4px;
    color: var(--gold);
  }
  .score-changes { margin: 16px 0; }
  .score-row {
    display: flex; justify-content: space-between;
    padding: 4px 0; font-size: 0.9rem;
  }
  .score-row .delta { font-weight: bold; }
  .score-row .delta.pos { color: #6f6; }
  .score-row .delta.neg { color: #f66; }
  .settlement-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-settle { flex: 1; padding: 12px; border: none; border-radius: 8px;
                font-size: 1rem; cursor: pointer; font-weight: bold; }
  .btn-continue { background: linear-gradient(135deg, var(--gold), #8a6a00); color: #1a0800; }
  .btn-gameover { background: rgba(255,255,255,0.1); color: var(--ivory); }

  /* ── Flowers display ────────────────────── */
  .flowers-row { display: flex; gap: 2px; flex-wrap: wrap; }
  .flower-tile {
    width: 20px; height: 24px; border-radius: 3px; font-size: 0.6rem;
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(200,80,160,0.2); color: #f0a0e0;
    border: 1px solid rgba(200,80,160,0.3);
  }

  /* ── Game over ──────────────────────────── */
  .gameover-card {
    background: linear-gradient(160deg, #0d1520, #050a10);
    border: 2px solid var(--gold); border-radius: 20px;
    padding: 40px; text-align: center; max-width: 420px; width: 90%;
  }
  .gameover-card h2 { color: var(--gold); font-size: 2rem; margin-bottom: 24px; }
  .rank-list { list-style: none; margin-bottom: 24px; }
  .rank-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px; margin-bottom: 6px; border-radius: 8px;
    background: rgba(255,255,255,0.05); font-size: 1rem;
  }
  .rank-item.rank-1 { background: rgba(212,175,55,0.15); border: 1px solid rgba(212,175,55,0.3); }
  .rank-medal { font-size: 1.4rem; width: 32px; }
  .rank-score { color: var(--gold); font-weight: bold; }
  .btn-restart {
    padding: 14px 32px; background: linear-gradient(135deg, var(--gold), #8a6a00);
    color: #1a0800; border: none; border-radius: 10px;
    font-size: 1.1rem; font-weight: bold; cursor: pointer;
    box-shadow: 0 4px 15px rgba(212,175,55,0.4);
  }

  @media (max-width: 600px) {
    .tile { width: 30px; height: 40px; font-size: 0.9rem; }
    .tile-sm { width: 20px; height: 26px; font-size: 0.65rem; }
    .table-layout { grid-template-columns: 80px 1fr 80px; }
  }
</style>
</head>
<body>

<!-- ═══ Start Screen ═══ -->
<div id="start-screen">
  <div style="font-size:4rem;margin-bottom:-8px;">🀄</div>
  <h1>中國麻將</h1>
  <p class="subtitle">Chinese Mahjong · 國標規則</p>
  <div class="start-card">
    <h2>遊戲設定</h2>
    <div class="form-group">
      <label>AI 難度</label>
      <select id="ai-level">
        <option value="1">⭐ 新手 – 隨機出牌</option>
        <option value="2" selected>⭐⭐ 普通 – 基礎策略</option>
        <option value="3">⭐⭐⭐ 進階 – 攻守兼備</option>
        <option value="4">⭐⭐⭐⭐ 高手 – 讀牌能力強</option>
      </select>
    </div>
    <div class="form-group">
      <label>局數</label>
      <select id="total-rounds">
        <option value="4">快速局（4 局·東風）</option>
        <option value="8" selected>標準局（8 局·東南風）</option>
        <option value="16">完整局（16 局·全風）</option>
      </select>
    </div>
    <button class="btn-start" onclick="startGame()">開始遊戲 ▶</button>
  </div>
</div>

<!-- ═══ Game Screen ═══ -->
<div id="game-screen">

  <!-- Header -->
  <div class="header">
    <div class="round-info" id="round-info">第 1 局 · 東風圈</div>
    <div class="scores" id="score-bar"></div>
    <div style="font-size:0.8rem;opacity:0.6" id="wall-count-header">剩餘 ? 張</div>
  </div>

  <!-- Table -->
  <div class="table-layout">

    <!-- North (AI player 3) -->
    <div class="player-area north-area" id="area-north">
      <div class="player-label">
        <span id="label-north">北家 AI</span>
        <span class="wind-badge" id="wind-north">北</span>
        <span class="dealer-star" id="dealer-north" style="display:none">★莊</span>
      </div>
      <div class="tiles-row" id="hand-north"></div>
      <div class="exposed-melds" id="exposed-north"></div>
      <div class="discard-pool" id="discard-north"></div>
      <div class="flowers-row" id="flowers-north"></div>
    </div>

    <!-- West (AI player 2) -->
    <div class="player-area west-area" id="area-west">
      <div class="player-label">
        <span id="label-west">西家 AI</span>
        <span class="wind-badge" id="wind-west">西</span>
        <span class="dealer-star" id="dealer-west" style="display:none">★莊</span>
      </div>
      <div class="tiles-row" id="hand-west"></div>
      <div class="exposed-melds" id="exposed-west"></div>
      <div class="discard-pool" id="discard-west"></div>
      <div class="flowers-row" id="flowers-west"></div>
    </div>

    <!-- Center: wall + last discard -->
    <div class="center-area">
      <div class="wall-display">
        <div class="wall-count" id="wall-count">?</div>
        <div class="wall-label">剩餘牌張</div>
        <div class="wall-pile" id="wall-pile"></div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:0.7rem;opacity:0.6;margin-bottom:4px;">最後打出</div>
        <div id="last-discard" style="min-height:52px;display:flex;align-items:center;justify-content:center;"></div>
      </div>
    </div>

    <!-- East (AI player 1) -->
    <div class="player-area east-area" id="area-east">
      <div class="player-label">
        <span id="label-east">東家 AI</span>
        <span class="wind-badge" id="wind-east">東</span>
        <span class="dealer-star" id="dealer-east" style="display:none">★莊</span>
      </div>
      <div class="tiles-row" id="hand-east"></div>
      <div class="exposed-melds" id="exposed-east"></div>
      <div class="discard-pool" id="discard-east"></div>
      <div class="flowers-row" id="flowers-east"></div>
    </div>

    <!-- South / Human (player 0) -->
    <div class="player-area south-area" id="area-south">
      <div class="player-label">
        <span id="label-south">玩家</span>
        <span class="wind-badge" id="wind-south">南</span>
        <span class="dealer-star" id="dealer-south" style="display:none">★莊</span>
        <span id="tenpai-badge" style="display:none;color:#7fc;font-size:0.7rem;">✓ 聽牌</span>
      </div>
      <div class="exposed-melds" id="exposed-south"></div>
      <div class="tiles-row" id="hand-south"></div>
      <div class="discard-pool" id="discard-south"></div>
      <div class="flowers-row" id="flowers-south"></div>
    </div>

  </div><!-- end table-layout -->

  <!-- Action bar -->
  <div class="action-bar" id="action-bar">
    <span class="action-label">動作：</span>
    <span id="action-hint" style="font-size:0.8rem;opacity:0.7;">等待...</span>
  </div>

  <!-- Message -->
  <div class="message-box" id="message-box">遊戲開始！</div>

</div><!-- end game-screen -->

<!-- ═══ Settlement Overlay ═══ -->
<div class="settlement-overlay" id="settlement-overlay">
  <div class="settlement-card">
    <h2 id="settlement-title">🎉 胡牌結算</h2>
    <div class="fan-list" id="fan-list"></div>
    <div class="score-changes" id="score-changes"></div>
    <div class="settlement-actions">
      <button class="btn-settle btn-continue" id="btn-continue" onclick="continueGame()">下一局 ▶</button>
      <button class="btn-settle btn-gameover" onclick="showGameOver()">結束遊戲</button>
    </div>
  </div>
</div>

<!-- ═══ Game Over Overlay ═══ -->
<div class="settlement-overlay" id="gameover-overlay">
  <div class="gameover-card">
    <h2>🏆 遊戲結束</h2>
    <ul class="rank-list" id="rank-list"></ul>
    <button class="btn-restart" onclick="location.reload()">再玩一局 🀄</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  Game state
// ═══════════════════════════════════════════════
let gameId = null;
let gameState = null;
let selectedTile = null;
let prevScores = [30000, 30000, 30000, 30000];

const API = '/api/game';

// Map: game seat index → display position
// Players[0]=human (south), [1]=east, [2]=north, [3]=west  (relative seating)
const SEAT_MAP = {
  0: 'south',  // human
  1: 'east',
  2: 'north',
  3: 'west',
};

// ── Tile helpers ──────────────────────────────
function tileClass(t) {
  if (!t || t.hidden) return '';
  const suit = t.suit.toLowerCase();
  let cls = `tile ${suit}`;
  if (suit === 'jian') cls += ` jian-${t.value}`;
  if (suit === 'hua')  cls += ' flower';
  return cls;
}

function tileSymbol(t) {
  if (!t || t.hidden) return '🀫';
  return t.symbol || t.displayName || '?';
}

function renderTile(t, small = false, selectable = false) {
  if (!t) return '';
  if (t.hidden) {
    return small
      ? `<div class="tile-back">🀫</div>`
      : `<div class="tile-back" style="width:40px;height:52px;font-size:1.2rem">🀫</div>`;
  }
  const sym   = t.symbol || (t.displayName || '?');
  const name  = t.displayName || '?';
  const suit  = (t.suit || '').toLowerCase();
  let cls = small ? 'tile-sm' : `tile ${suit}`;
  if (suit === 'jian') cls += ` jian-${t.value}`;
  if (suit === 'hua')  cls += ' flower';
  if (t.drawn)         cls += ' drawn';
  if (selectable)      cls += ` selectable`;

  const content = small
    ? `<span>${sym}</span>`
    : `<span>${sym}</span><span class="suit-label">${name}</span>`;

  const click = selectable ? `onclick="selectTile('${t.id}')"` : '';
  const sel   = (selectedTile && selectedTile.id === t.id) ? ' selected' : '';

  return `<div class="${cls}${sel}" ${click} title="${name}" data-id="${t.id}">${content}</div>`;
}

// ── Start ─────────────────────────────────────
async function startGame() {
  const aiLevel     = parseInt(document.getElementById('ai-level').value);
  const totalRounds = parseInt(document.getElementById('total-rounds').value);

  const res = await fetch(`${API}/start`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ aiLevel, totalRounds })
  });
  gameState = await res.json();
  gameId = gameState.gameId;
  prevScores = gameState.players.map(p => p.score);

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-screen').style.display  = 'block';

  render();
}

// ── Render ────────────────────────────────────
function render() {
  if (!gameState) return;
  const gs = gameState;
  const players = gs.players;

  // Header
  const roundWindMap = {EAST:'東',SOUTH:'南',WEST:'西',NORTH:'北'};
  document.getElementById('round-info').textContent =
    `第 ${gs.round} / ${gs.totalRounds} 局 · ${roundWindMap[gs.roundWind] || gs.roundWind}風圈`;

  const wallLeft = gs.remainingTiles !== undefined ? gs.remainingTiles
    : Math.max(0, (gs.wall ? gs.wall.length : 136) - gs.wallIndex);
  document.getElementById('wall-count').textContent = wallLeft;
  document.getElementById('wall-count-header').textContent = `剩餘 ${wallLeft} 張`;

  // Wall visualization (blocks)
  const wPile = document.getElementById('wall-pile');
  const blockCount = Math.min(Math.ceil(wallLeft / 4), 36);
  wPile.innerHTML = Array(blockCount).fill('<div class="wall-block"></div>').join('');

  // Last discard
  const ldEl = document.getElementById('last-discard');
  ldEl.innerHTML = gs.lastDiscard ? renderTile(gs.lastDiscard, false, false) : '';

  // Player areas: players[0]=human=south, [1]=east, [2]=north, [3]=west
  const posMap = [
    { pos: 'south', p: players[0] },
    { pos: 'east',  p: players[1] },
    { pos: 'north', p: players[2] },
    { pos: 'west',  p: players[3] },
  ];

  for (const {pos, p} of posMap) {
    const isHuman = p.type === 'HUMAN';
    const isActive = gs.currentPlayerIndex === players.indexOf(p);
    const isWinner = gs.winnerIndex === players.indexOf(p);

    // Area highlight
    const area = document.getElementById(`area-${pos}`);
    area.className = `player-area ${pos}-area${isActive ? ' active' : ''}${isWinner ? ' winner' : ''}`;

    // Labels
    document.getElementById(`label-${pos}`).textContent = p.name;
    document.getElementById(`wind-${pos}`).textContent = windChinese(p.wind);
    const dealerEl = document.getElementById(`dealer-${pos}`);
    if (dealerEl) dealerEl.style.display = p.dealer ? 'inline' : 'none';

    // Hand
    const handEl = document.getElementById(`hand-${pos}`);
    if (isHuman) {
      handEl.innerHTML = p.hand.map((t, i) => renderTile(t, false, true)).join('');
    } else {
      // Show face-up if settlement
      if (gs.phase === 'SETTLEMENT' || gs.phase === 'GAME_OVER') {
        handEl.innerHTML = p.hand.map(t => renderTile(t, true)).join('');
      } else {
        handEl.innerHTML = p.hand.map(() => `<div class="tile-back">🀫</div>`).join('');
      }
    }

    // Exposed melds
    const expEl = document.getElementById(`exposed-${pos}`);
    expEl.innerHTML = (p.exposed || []).map(meld => {
      const tiles = meld.tiles.map(t => renderTile(t, true)).join('');
      return `<div class="meld-group">${tiles}</div>`;
    }).join('');

    // Discards
    const discEl = document.getElementById(`discard-${pos}`);
    discEl.innerHTML = (p.discards || []).map((t, i) => {
      const isLast = (i === p.discards.length - 1) && (gs.lastDiscardPlayerIndex === players.indexOf(p));
      return `<div class="discard-tile${isLast ? ' last' : ''}" title="${t.displayName}">${t.symbol || t.displayName}</div>`;
    }).join('');

    // Flowers
    const flEl = document.getElementById(`flowers-${pos}`);
    if (flEl) {
      flEl.innerHTML = (p.flowers || []).map(t =>
        `<div class="flower-tile" title="${t.displayName}">🌸</div>`
      ).join('');
    }
  }

  // Score bar
  const scoreBar = document.getElementById('score-bar');
  scoreBar.innerHTML = players.map((p, i) => {
    const isHuman = i === 0;
    return `<div class="score-chip${isHuman ? ' human' : ''}">${p.name}: ${p.score.toLocaleString()}</div>`;
  }).join('');

  // Tenpai badge for human
  const tb = document.getElementById('tenpai-badge');
  if (tb) tb.style.display = players[0].tenpai ? 'inline' : 'none';

  // Action bar
  renderActionBar();

  // Message
  const msgEl = document.getElementById('message-box');
  msgEl.textContent = gs.message || '';
  msgEl.className = 'message-box' + (gs.winnerIndex >= 0 ? ' win' : '') + (gs.exhaustiveDraw ? ' exhaustive' : '');

  // Settlement overlay
  if (gs.phase === 'SETTLEMENT') {
    showSettlement();
  }
  if (gs.phase === 'GAME_OVER') {
    showGameOver();
  }
}

function renderActionBar() {
  const gs = gameState;
  const bar = document.getElementById('action-bar');
  const hint = document.getElementById('action-hint');
  const actions = gs.availableActions || [];
  const isHumanTurn = gs.currentPlayerIndex === 0;

  bar.innerHTML = '<span class="action-label">動作：</span>';

  if (!actions.length || (!isHumanTurn && gs.phase === 'PLAYING' && gs.lastDiscardPlayerIndex !== 0)) {
    hint.textContent = `等待 ${gs.players[gs.currentPlayerIndex]?.name || 'AI'} 出牌...`;
    bar.appendChild(hint);
    return;
  }

  if (actions.includes('DISCARD')) {
    bar.innerHTML += `<button class="btn-action btn-discard" onclick="doDiscard()">打牌</button>`;
  }
  if (actions.includes('CHI')) {
    bar.innerHTML += `<button class="btn-action btn-chi" onclick="doChi()">吃</button>`;
  }
  if (actions.includes('PENG')) {
    bar.innerHTML += `<button class="btn-action btn-peng" onclick="sendAction({type:'PENG'})">碰</button>`;
  }
  if (actions.includes('GANG')) {
    bar.innerHTML += `<button class="btn-action btn-gang" onclick="sendAction({type:'GANG'})">明槓</button>`;
  }
  if (actions.includes('AN_GANG')) {
    bar.innerHTML += `<button class="btn-action btn-angang" onclick="doAnGang()">暗槓</button>`;
  }
  if (actions.includes('SELF_DRAW_WIN')) {
    bar.innerHTML += `<button class="btn-action btn-selfwin" onclick="sendAction({type:'SELF_DRAW_WIN'})">自摸 🎉</button>`;
  }
  if (actions.includes('WIN')) {
    bar.innerHTML += `<button class="btn-action btn-win" onclick="sendAction({type:'WIN'})">胡牌 🎉</button>`;
  }
  if (actions.includes('PASS')) {
    bar.innerHTML += `<button class="btn-action btn-pass" onclick="sendAction({type:'PASS'})">過</button>`;
  }
}

// ── Actions ───────────────────────────────────
function selectTile(id) {
  const hand = gameState.players[0].hand;
  const t = hand.find(x => x.id === id);
  if (!t) return;
  selectedTile = (selectedTile && selectedTile.id === id) ? null : t;
  // Re-render just the hand
  const handEl = document.getElementById('hand-south');
  handEl.innerHTML = hand.map(t => renderTile(t, false, true)).join('');
}

function doDiscard() {
  if (!selectedTile) {
    showMsg('請先點選要打出的牌！', 'warn');
    return;
  }
  sendAction({ type: 'DISCARD', tileId: selectedTile.id });
  selectedTile = null;
}

function doChi() {
  if (!selectedTile) {
    showMsg('請選擇一張手牌配合吃牌！', 'warn');
    return;
  }
  // Find the second tile that forms a sequence with selectedTile and lastDiscard
  const discard = gameState.lastDiscard;
  const hand    = gameState.players[0].hand;
  const v = discard.value;
  const s = discard.suit;
  const selV = selectedTile.value;
  // Determine the second needed tile
  let needed;
  if (selV === v - 2) needed = v - 1;
  else if (selV === v - 1) needed = v + 1;  // kanchan
  else if (selV === v + 1) needed = v - 1;  // kanchan
  else if (selV === v + 1) needed = v + 2;
  else if (selV === v + 2) needed = v + 1;
  // Simpler: just send selectedTile and let backend figure it out
  // We need 2 hand tiles. Prompt user to select 2, but for simplicity auto-pick.
  const chiOpts = findChiOptions(hand, discard);
  if (chiOpts.length === 0) { showMsg('無法吃牌！', 'warn'); return; }
  const pair = chiOpts.find(p => p.some(t => t.id === selectedTile.id)) || chiOpts[0];
  sendAction({ type: 'CHI', chiTileIds: pair.map(t => t.id) });
  selectedTile = null;
}

function findChiOptions(hand, discard) {
  if (!discard.suit.match(/WAN|TONG|SUO/i)) return [];
  const v = discard.value, s = discard.suit;
  const opts = [];
  const pats = [[v-2,v-1],[v-1,v+1],[v+1,v+2]];
  for (const [v1,v2] of pats) {
    if (v1 < 1 || v2 > 9) continue;
    const t1 = hand.find(t => t.suit === s && t.value === v1);
    const t2 = hand.find(t => t.suit === s && t.value === v2 && t !== t1);
    if (t1 && t2) opts.push([t1,t2]);
  }
  return opts;
}

function doAnGang() {
  if (!selectedTile) { showMsg('請選擇要暗槓的牌！'); return; }
  sendAction({ type: 'AN_GANG', tileId: selectedTile.id });
  selectedTile = null;
}

async function sendAction(action) {
  if (!gameId) return;
  try {
    const res = await fetch(`${API}/${gameId}/action`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(action)
    });
    const newState = await res.json();
    prevScores = gameState.players.map(p => p.score);
    gameState = newState;
    render();
  } catch (e) { console.error(e); }
}

async function continueGame() {
  document.getElementById('settlement-overlay').classList.remove('show');
  const res = await fetch(`${API}/${gameId}/next-round`, { method: 'POST' });
  gameState = await res.json();
  prevScores = gameState.players.map(p => p.score);
  render();
}

// ── Settlement ────────────────────────────────
function showSettlement() {
  const gs = gameState;
  const overlay = document.getElementById('settlement-overlay');
  overlay.classList.add('show');

  const title = document.getElementById('settlement-title');
  if (gs.exhaustiveDraw) {
    title.textContent = '🃏 流局';
  } else if (gs.winnerIndex >= 0) {
    const winner = gs.players[gs.winnerIndex];
    title.textContent = (gs.winnerIndex === 0 ? '🎉 ' : '') + winner.name + ' 胡牌！';
  }

  // Fan list
  const fanList = document.getElementById('fan-list');
  if (gs.lastWinResult && !gs.exhaustiveDraw) {
    const wr = gs.lastWinResult;
    fanList.innerHTML = wr.fanList.map(f =>
      `<div class="fan-item"><span>${f.name}</span><span class="fan-count">${f.fan} 番</span></div>`
    ).join('') +
    `<div class="fan-total"><span>合計</span><span>${wr.totalFan} 番（${wr.baseScore} 分/番）</span></div>`;
  } else {
    fanList.innerHTML = '';
  }

  // Score changes
  const scoreChanges = document.getElementById('score-changes');
  scoreChanges.innerHTML = '<div style="font-size:0.85rem;opacity:0.6;margin-bottom:8px;">積分變動</div>' +
    gs.players.map((p, i) => {
      const delta = p.score - prevScores[i];
      const cls = delta > 0 ? 'pos' : (delta < 0 ? 'neg' : '');
      const sign = delta > 0 ? '+' : '';
      return `<div class="score-row">
        <span>${p.name}</span>
        <span class="delta ${cls}">${sign}${delta}</span>
        <span style="color:var(--gold)">${p.score.toLocaleString()}</span>
      </div>`;
    }).join('');

  // Continue button
  const continueBtn = document.getElementById('btn-continue');
  if (gs.round >= gs.totalRounds || gs.phase === 'GAME_OVER') {
    continueBtn.textContent = '查看排名';
    continueBtn.onclick = showGameOver;
  } else {
    continueBtn.textContent = `下一局 (${gs.round + 1}/${gs.totalRounds}) ▶`;
    continueBtn.onclick = continueGame;
  }
}

function showGameOver() {
  document.getElementById('settlement-overlay').classList.remove('show');
  const overlay = document.getElementById('gameover-overlay');
  overlay.classList.add('show');

  const players = (gameState?.players || []).slice().sort((a, b) => b.score - a.score);
  const medals = ['🥇','🥈','🥉','4️⃣'];
  const rankList = document.getElementById('rank-list');
  rankList.innerHTML = players.map((p, i) =>
    `<li class="rank-item${i===0?' rank-1':''}">
       <span class="rank-medal">${medals[i]}</span>
       <span>${p.name}</span>
       <span class="rank-score">${p.score.toLocaleString()}</span>
     </li>`
  ).join('');
}

// ── Helpers ───────────────────────────────────
function windChinese(w) {
  return {EAST:'東',SOUTH:'南',WEST:'西',NORTH:'北'}[w] || w || '?';
}
function showMsg(msg) {
  document.getElementById('message-box').textContent = msg;
}
</script>


<script>
// ═══════════════════════════════════════════════
//  🎵 音效系統 (Web Audio API)
// ═══════════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let ctx = null;
let bgmGain = null;
let sfxGain = null;
let bgmPlaying = false;
let bgmNodes = [];

function initAudio() {
    if (ctx) return;
    ctx = new AudioCtx();
    bgmGain = ctx.createGain(); bgmGain.gain.value = 0.35; bgmGain.connect(ctx.destination);
    sfxGain = ctx.createGain(); sfxGain.gain.value = 0.7;  sfxGain.connect(ctx.destination);
}

// ── 背景音樂（中式五聲音階 BGM）────────────────
function startBGM() {
    if (!ctx || bgmPlaying) return;
    bgmPlaying = true;

    // 五聲音階：C D E G A（宮商角徵羽）
    const pentatonic = [261.63, 293.66, 329.63, 392.00, 440.00,
                        523.25, 587.33, 659.25, 784.00, 880.00];

    // 主旋律音型
    const melody = [4,2,0,2,4,7,6,4, 4,2,0,2,4,2,0,-1,
                    3,2,0,2,3,6,4,3, 2,0,2,3,2,0,-1,-1];

    let step = 0;
    function playMelodyNote() {
        if (!bgmPlaying) return;
        const idx = melody[step % melody.length];
        if (idx >= 0) {
            const osc  = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(bgmGain);
            osc.type = 'sine';
            osc.frequency.value = pentatonic[idx];
            const t = ctx.currentTime;
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.4, t + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
            osc.start(t); osc.stop(t + 0.6);
            bgmNodes.push(osc);
        }
        step++;
        setTimeout(playMelodyNote, 620);
    }

    // 伴奏撥弦（低音）
    function playBass() {
        if (!bgmPlaying) return;
        const bassNotes = [130.81, 146.83, 164.81, 196.00];
        const note = bassNotes[Math.floor(step / 8) % bassNotes.length];
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(bgmGain);
        osc.type = 'triangle';
        osc.frequency.value = note;
        const t = ctx.currentTime;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.25, t + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
        osc.start(t); osc.stop(t + 1.3);
        setTimeout(playBass, 2480);
    }

    // 打擊樂（木魚風格）
    function playPerc() {
        if (!bgmPlaying) return;
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.08, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.02));
        }
        const src  = ctx.createBufferSource();
        const gain = ctx.createGain();
        const filt = ctx.createBiquadFilter();
        filt.type = 'bandpass'; filt.frequency.value = 800; filt.Q.value = 3;
        src.buffer = buf;
        src.connect(filt); filt.connect(gain); gain.connect(bgmGain);
        gain.gain.value = 0.3;
        src.start();
        const interval = [620, 620, 1240, 620][Math.floor(Math.random() * 4)];
        setTimeout(playPerc, interval);
    }

    playMelodyNote();
    setTimeout(playBass, 310);
    setTimeout(playPerc, 930);
}

function stopBGM() {
    bgmPlaying = false;
    bgmNodes.forEach(n => { try { n.stop(); } catch(e){} });
    bgmNodes = [];
}

// ── 音效 SFX ────────────────────────────────────
function sfxDiscard() {
    if (!ctx) return;
    // 清脆拍桌聲
    const buf  = ctx.createBuffer(1, ctx.sampleRate * 0.15, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.03));
    }
    const src  = ctx.createBufferSource();
    const gain = ctx.createGain();
    const filt = ctx.createBiquadFilter();
    filt.type = 'highpass'; filt.frequency.value = 1200;
    src.buffer = buf;
    src.connect(filt); filt.connect(gain); gain.connect(sfxGain);
    gain.gain.value = 0.8;
    src.start();
}

function sfxDraw() {
    if (!ctx) return;
    // 摸牌滑動聲
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(sfxGain);
    osc.type = 'sine';
    const t = ctx.currentTime;
    osc.frequency.setValueAtTime(600, t);
    osc.frequency.linearRampToValueAtTime(900, t + 0.08);
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    osc.start(t); osc.stop(t + 0.15);
}

function sfxPeng() {
    if (!ctx) return;
    // 碰！重擊聲
    [0, 0.06, 0.12].forEach(delay => {
        const buf  = ctx.createBuffer(1, ctx.sampleRate * 0.2, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.05));
        }
        const src  = ctx.createBufferSource();
        const gain = ctx.createGain();
        const filt = ctx.createBiquadFilter();
        filt.type = 'bandpass'; filt.frequency.value = 400; filt.Q.value = 2;
        src.buffer = buf;
        src.connect(filt); filt.connect(gain); gain.connect(sfxGain);
        gain.gain.value = 0.9;
        src.start(ctx.currentTime + delay);
    });
}

function sfxGang() {
    if (!ctx) return;
    // 槓！四連擊
    [0, 0.07, 0.14, 0.21].forEach(delay => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(sfxGain);
        osc.type = 'square';
        osc.frequency.value = 220;
        const t = ctx.currentTime + delay;
        gain.gain.setValueAtTime(0.4, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        osc.start(t); osc.stop(t + 0.12);
    });
}

function sfxWin() {
    if (!ctx) return;
    // 胡牌歡呼！上揚音階
    const notes = [523.25, 659.25, 784.00, 1046.50];
    notes.forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(sfxGain);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t = ctx.currentTime + i * 0.12;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.6, t + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
        osc.start(t); osc.stop(t + 0.45);
    });
    // 金幣聲
    setTimeout(() => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(sfxGain);
        osc.type = 'sine';
        osc.frequency.value = 1318.5;
        const t = ctx.currentTime;
        gain.gain.setValueAtTime(0.5, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
        osc.start(t); osc.stop(t + 0.85);
    }, 500);
}

function sfxExhaustive() {
    if (!ctx) return;
    // 流局：下降音
    const notes = [392, 329.63, 261.63];
    notes.forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(sfxGain);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t = ctx.currentTime + i * 0.18;
        gain.gain.setValueAtTime(0.4, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
        osc.start(t); osc.stop(t + 0.55);
    });
}

// ── 音效控制 UI ─────────────────────────────────
function addAudioControls() {
    const bar = document.querySelector('.header');
    if (!bar) return;
    bar.innerHTML += `
        <div style="display:flex;gap:8px;align-items:center">
            <button id="btn-bgm" onclick="toggleBGM()"
                style="background:rgba(212,175,55,0.2);border:1px solid rgba(212,175,55,0.4);
                       color:var(--gold);border-radius:20px;padding:3px 12px;
                       cursor:pointer;font-size:0.8rem;">🎵 音樂</button>
            <input id="vol-bgm" type="range" min="0" max="100" value="35"
                oninput="setBGMVol(this.value)"
                style="width:60px;accent-color:var(--gold);" title="音樂音量">
            <input id="vol-sfx" type="range" min="0" max="100" value="70"
                oninput="setSFXVol(this.value)"
                style="width:60px;accent-color:#7fc;" title="音效音量">
        </div>`;
}

function toggleBGM() {
    initAudio();
    const btn = document.getElementById('btn-bgm');
    if (bgmPlaying) {
        stopBGM();
        btn.textContent = '🔇 音樂';
        btn.style.opacity = '0.5';
    } else {
        startBGM();
        btn.textContent = '🎵 音樂';
        btn.style.opacity = '1';
    }
}

function setBGMVol(v) {
    if (bgmGain) bgmGain.gain.value = v / 100 * 0.5;
}
function setSFXVol(v) {
    if (sfxGain) sfxGain.gain.value = v / 100;
}

// ── 掛鉤到遊戲動作 ──────────────────────────────
// 在原本的 sendAction 包一層
const _origSendAction = sendAction;
window.sendAction = async function(action) {
    initAudio();
    // 播音效
    switch(action.type) {
        case 'DISCARD':      sfxDiscard(); break;
        case 'PENG':         sfxPeng();    break;
        case 'GANG':
        case 'AN_GANG':      sfxGang();    break;
        case 'WIN':
        case 'SELF_DRAW_WIN': sfxWin();   break;
    }
    await _origSendAction(action);
    // 結算後的音效
    if (gameState?.exhaustiveDraw) sfxExhaustive();
    if (gameState?.winnerIndex >= 0 && action.type !== 'WIN' && action.type !== 'SELF_DRAW_WIN') {
        sfxWin(); // AI 胡牌
    }
};

// 遊戲啟動時加入控制列
const _origStartGame = startGame;
window.startGame = async function() {
    await _origStartGame();
    addAudioControls();
    // 自動開始背景音樂（需使用者互動後才能播）
    initAudio();
    startBGM();
    document.getElementById('btn-bgm').textContent = '🎵 音樂';
};
</script>
</body>
</html>
